    ok:"You move through the filesystem like walking its halls." },

  { belt:"yellow", title:"Read the scroll", sub:"cat",
    prose:"A file's contents are opened with <code>cat</code> (\"concatenate\"). There is a <code>README.txt</code> in your home directory left by the sensei. Return home first if you wandered off — <code>cd ~</code> — then read it.",
    task:"Display <b>README.txt</b> with <b>cat README.txt</b>.",
    hint:"If you're in projects, run <b>cd ~</b> first, then <b>cat README.txt</b>.",
    setup:()=>{ if(!H("README.txt")) writeFile(HOME+"/README.txt","Welcome to the Terminal Dojo.\nHere you learn the way of the shell by doing.\n"); },
    check:(c)=> base(c.cmd)==="cat" && /welcome/i.test(c.out),
    ok:"The written word yields to you." },

  { belt:"yellow", title:"Write with your voice", sub:"echo  >",
    prose:"<code>echo</code> speaks text back to you. Aim that voice into a file with the <strong>redirection</strong> arrow <code>&gt;</code>, and the words are saved instead of printed. <code>&gt;</code> overwrites; <code>&gt;&gt;</code> appends.",
    task:"Create <b>notes.txt</b> containing the words <b>hello dojo</b> using <b>echo \"hello dojo\" &gt; notes.txt</b>.",
    hint:"Run <b>echo \"hello dojo\" &gt; notes.txt</b>, then prove it with <b>cat notes.txt</b>.",
    check:()=>{ const n=H("notes.txt"); return n&&n.type==="file"&&/hello dojo/i.test(n.content); },
    ok:"You now write to the world, not just read it." },

  { belt:"yellow", title:"Build a room", sub:"mkdir",
    prose:"Structure is discipline. <code>mkdir</code> (\"make directory\") creates a new folder. Practice deserves its own space — make one called <code>kata</code>.",
    task:"Create a directory named <b>kata</b> with <b>mkdir kata</b>.",
    hint:"Type <b>mkdir kata</b>, then run <b>ls</b> — you'll see it in blue.",
    check:()=>{ const n=H("kata"); return n&&n.type==="dir"; },
    ok:"You shape the space you train in." },

  { belt:"orange", title:"Duplicate a form", sub:"cp",
    prose:"To preserve work before changing it, you copy. <code>cp</code> (\"copy\") duplicates a file: <code>cp SOURCE DEST</code>. A dataset <code>data.csv</code> sits in your home — make a safe backup of it.",
    task:"Copy <b>data.csv</b> to <b>backup.csv</b> with <b>cp data.csv backup.csv</b>.",
    hint:"Run <b>cp data.csv backup.csv</b>. Both should appear in <b>ls</b>.",
    setup:()=>{ if(!H("data.csv")) writeFile(HOME+"/data.csv","id,score\n1,88\n2,73\n3,95\n"); },
    check:()=>{ const s=H("data.csv"),d=H("backup.csv"); return s&&d&&d.type==="file"&&d.content===s.content; },
    ok:"You guard your work before you risk it. Wise." },

  { belt:"orange", title:"Rename and relocate", sub:"mv",
    prose:"<code>mv</code> (\"move\") both moves and renames — moving a file onto a new name <em>is</em> renaming it. A file <code>draft.txt</code> is ready to be finalized.",
    task:"Rename <b>draft.txt</b> to <b>final.txt</b> with <b>mv draft.txt final.txt</b>.",
    hint:"Run <b>mv draft.txt final.txt</b>. Afterwards draft.txt is gone and final.txt remains.",
    setup:()=>{ if(!H("final.txt")&&!H("draft.txt")) writeFile(HOME+"/draft.txt","first attempt\n"); },
    check:()=> H("final.txt")&&!H("draft.txt"),
    ok:"One motion, renamed and moved. Efficiency is a virtue." },

  { belt:"orange", title:"Clear away clutter", sub:"rm",
    prose:"What no longer serves you is removed. <code>rm</code> (\"remove\") deletes a file — permanently, with no trash can. Wield it carefully. A stray <code>temp.log</code> is cluttering your home.",
    task:"Delete <b>temp.log</b> with <b>rm temp.log</b>.",
    hint:"Type <b>rm temp.log</b>. Confirm it's gone with <b>ls</b>.",
    setup:()=>{ if(!H("temp.log")) writeFile(HOME+"/temp.log","junk\n"); },
    check:()=> !H("temp.log"),
    ok:"A clean space is a clear mind." },

  { belt:"green", title:"Find the signal", sub:"grep",
    prose:"Among many lines, you seek the few that matter. <code>grep</code> searches text for a <strong>pattern</strong> and prints only the matching lines: <code>grep PATTERN FILE</code>. Your <code>server.log</code> is full of noise — find the failures.",
    task:"Show only lines containing <b>ERROR</b> with <b>grep ERROR server.log</b>.",
    hint:"Run <b>grep ERROR server.log</b>. Matches are highlighted in amber.",
    setup:seedLog,
    check:(c)=> base(c.cmd)==="grep" && /ERROR/.test(c.out),
    ok:"You pull the signal from the noise." },

  { belt:"green", title:"Count what you found", sub:"wc -l",
    prose:"Numbers turn observation into knowledge. <code>wc</code> (\"word count\") counts lines, words, and bytes. With <code>-l</code> it counts <strong>lines</strong> only: <code>wc -l FILE</code>.",
    task:"Count the lines in <b>server.log</b> with <b>wc -l server.log</b>.",
    hint:"Run <b>wc -l server.log</b>. You'll get a single number and the filename.",
    setup:seedLog,
    check:(c)=> base(c.cmd)==="wc" && /-l/.test(c.cmd) && /server\.log/.test(c.cmd),
    ok:"You measure, therefore you understand." },

  { belt:"green", title:"Hunt through the tree", sub:"find",
    prose:"Files hide in nested folders. <code>find</code> walks an entire directory tree and reports what matches. <code>find . -name \"PATTERN\"</code> searches from the current directory (<code>.</code>) downward, matching filenames — wildcards like <code>*</code> welcome. A <code>logs</code> folder now holds several log files scattered about.",
    task:"Find every file ending in <b>.log</b> with <b>find . -name \"*.log\"</b>.",
    hint:"Run <b>find . -name \"*.log\"</b>. The quotes stop the shell expanding the <code>*</code> too early.",
    setup:seedLogsTree,
    check:(c)=> base(c.cmd)==="find" && /-name/.test(c.cmd) && /\.log/.test(c.out),
    ok:"No file can hide from you now." },

  { belt:"blue", title:"Join two techniques", sub:"grep | wc",
    prose:"The true art of the shell is the <strong>pipe</strong> <code>|</code> — it feeds one command's output straight into the next as input. Chain <code>grep</code> into <code>wc -l</code> and you count matches without ever saving a file. This is the way.",
    task:"Count how many <b>ERROR</b> lines exist using a pipe: <b>grep ERROR server.log | wc -l</b>.",
    hint:"Run <b>grep ERROR server.log | wc -l</b>. The answer is a single number.",
    setup:seedLog,
    check:(c)=> c.cmd.includes("|") && c.cmd.includes("grep") && c.cmd.includes("wc"),
    ok:"Two techniques, one flowing motion. You understand the pipe." },

  { belt:"blue", title:"Put things in order", sub:"sort",
    prose:"Order reveals pattern. <code>sort</code> arranges lines alphabetically by default; <code>-n</code> sorts numerically, <code>-r</code> reverses. A shuffled list of <code>fruits.txt</code> waits to be tidied.",
    task:"Sort the lines of <b>fruits.txt</b> with <b>sort fruits.txt</b>.",
    hint:"Run <b>sort fruits.txt</b>. Try <b>sort -r fruits.txt</b> to reverse it.",
    setup:seedFruits,
    check:(c)=>{ if(base(c.cmd)!=="sort")return false; const ls=c.out.split("\n").filter(Boolean); if(ls.length<3)return false; for(let i=1;i<ls.length;i++) if(ls[i-1].localeCompare(ls[i])>0) return false; return true; },
    ok:"From chaos, order. The list obeys you." },

  { belt:"blue", title:"Count the unique", sub:"sort | uniq -c",
    prose:"<code>uniq</code> collapses <em>adjacent</em> repeated lines — so it is almost always paired with <code>sort</code> first. With <code>-c</code> it prefixes each line with how many times it occurred. Together, <code>sort | uniq -c</code> is the classic way to tally anything. A file <code>votes.txt</code> holds one vote per line.",
    task:"Tally the votes: <b>sort votes.txt | uniq -c</b>.",
    hint:"Run <b>sort votes.txt | uniq -c</b>. Each line shows a count next to its value.",
    setup:seedVotes,
    check:(c)=> c.cmd.includes("sort")&&c.cmd.includes("uniq")&&/-c/.test(c.cmd)&&/\d/.test(c.out),
    ok:"You turn a pile of records into a clean tally. Essential shell arithmetic." },

  { belt:"gold", title:"One after another", sub:";",
    prose:"A semicolon <code>;</code> simply runs commands one after the next on a single line, no matter how each turns out. It is the plainest way to chain — do this, then that.",
    task:"Run two commands in sequence: <b>echo first ; echo second</b>.",
    hint:"Type <b>echo first ; echo second</b>. Both run, top to bottom, regardless of outcome.",
    check:(c)=> c.cmd.includes(";") && /first/.test(c.out) && /second/.test(c.out),
    ok:"You string actions together. The line becomes a little program." },

  { belt:"gold", title:"Only if it succeeds", sub:"&&",
    prose:"Every command reports whether it <strong>succeeded</strong> or failed — an exit status you don't normally see. <code>&&</code> uses it: the right side runs <em>only if</em> the left side succeeded. This is how you chain steps safely — <code>mkdir dir && cd dir</code> won't try to enter a folder that failed to appear.",
    task:"Make a folder and enter it, only if the first step works: <b>mkdir practice && cd practice</b>.",
    hint:"Run <b>mkdir practice && cd practice</b>. Because mkdir succeeds, cd runs too — <b>pwd</b> ends in /practice.",
    setup:()=>{ const q=parentOf(resolve(HOME,"practice")); if(q.par&&q.par.children[q.name]) delete q.par.children[q.name]; },
    check:(c)=> c.cmd.includes("&&") && cwd.endsWith("/practice"),
    ok:"You guard each step behind the last. Safe, deliberate motion." },

  { belt:"gold", title:"Or else, recover", sub:"||",
    prose:"The mirror of <code>&&</code> is <code>||</code>: the right side runs <em>only if</em> the left side <strong>failed</strong>. It is the shell's way of saying \"try this, otherwise fall back.\" Reading a file that isn't there fails — so the fallback fires.",
    task:"Try to read a missing file, and recover: <b>cat missing.txt || echo \"using defaults\"</b>.",
    hint:"Run <b>cat missing.txt || echo \"using defaults\"</b>. cat fails, so the echo after || runs.",
    check:(c)=> c.cmd.includes("||") && /using defaults/.test(c.out),
    ok:"You plan for failure and route around it. This is how robust scripts are written." },

  { belt:"gold", title:"Capture a command's output", sub:"$(...)",
    prose:"The deepest composition of all: <code>$(...)</code> runs a command and drops its <strong>output straight into the line</strong>, as if you had typed the result yourself. Feed it into a variable — <code>export TODAY=\"$(date)\"</code> — or embed it inside text. (Older scripts use backticks <code>`…`</code> for the same thing; <code>$(...)</code> is the modern form.)",
    task:"Embed a command's result inside a sentence: <b>echo \"server.log has $(grep -c ERROR server.log) errors\"</b>.",
    hint:"Run <b>echo \"server.log has $(grep -c ERROR server.log) errors\"</b> — the <code>$(...)</code> becomes <code>3</code> before echo ever runs. Then try <b>export TODAY=\"$(date)\"</b> and <b>echo $TODAY</b> (quote it, so the spaces survive).",
    setup:seedLog,
    check:(c)=> c.cmd.includes("$(") && /has 3 errors/.test(c.out),
    ok:"You nest commands within commands. The shell holds no deeper magic than this." },

  { belt:"purple", title:"Slice out a column", sub:"cut",
    prose:"Structured data comes in columns. <code>cut</code> extracts them: <code>cut -d DELIM -f N</code> keeps field <code>N</code>, split on <code>DELIM</code>. A comma-separated <code>people.csv</code> holds names, ages, and cities — pull just one column.",
    task:"Extract the first column (names) with <b>cut -d, -f1 people.csv</b>.",
    hint:"Run <b>cut -d, -f1 people.csv</b>. The <code>-d,</code> sets the delimiter to a comma; <code>-f1</code> picks field one.",
    setup:seedPeople,
    check:(c)=> base(c.cmd)==="cut" && /kenji/.test(c.out) && !/osaka/.test(c.out),
    ok:"You carve exactly the column you need from the table." },

  { belt:"purple", title:"Transform each character", sub:"tr",
    prose:"<code>tr</code> (\"translate\") maps one set of characters to another as text streams through it — it reads from a pipe, not a file. <code>tr 'a-z' 'A-Z'</code> shouts everything in uppercase; <code>tr -d '0-9'</code> strips digits entirely.",
    task:"Pipe text through tr to uppercase it: <b>echo \"quiet dojo\" | tr 'a-z' 'A-Z'</b>.",
    hint:"Run <b>echo \"quiet dojo\" | tr 'a-z' 'A-Z'</b>. The result should read QUIET DOJO.",
    check:(c)=> c.cmd.includes("tr") && /QUIET DOJO/.test(c.out),
    ok:"Every character bends to your instruction." },

  { belt:"purple", title:"Rewrite on the fly", sub:"sed",
    prose:"<code>sed</code> is a stream editor — it transforms text as it flows past. Its signature move is substitution: <code>sed 's/OLD/NEW/g' FILE</code> replaces every <code>OLD</code> with <code>NEW</code>. The trailing <code>g</code> means \"global\" — every match on each line, not just the first.",
    task:"Rename every <b>ERROR</b> to <b>FAILURE</b> in server.log: <b>sed 's/ERROR/FAILURE/g' server.log</b>.",
    hint:"Run <b>sed 's/ERROR/FAILURE/g' server.log</b>. The file itself is untouched — sed prints the edited stream.",
    setup:seedLog,
    check:(c)=> base(c.cmd)==="sed" && /FAILURE/.test(c.out) && !/ERROR/.test(c.out),
    ok:"You reshape text as it flows. Powerful." },

  { belt:"brown", title:"Cut a column with awk", sub:"awk",
    prose:"<code>awk</code> sees each line as a set of <strong>fields</strong> split on whitespace: <code>$1</code> is the first, <code>$2</code> the second, <code>$NF</code> the last. <code>awk '{print $1}'</code> prints just the first column of every line — and unlike <code>cut</code>, it handles ragged whitespace gracefully and can filter by pattern too.",
    task:"Print the log level (first field) of each line: <b>awk '{print $1}' server.log</b>.",
    hint:"Run <b>awk '{print $1}' server.log</b> for a clean column of INFO / WARN / ERROR. Try <b>awk '/ERROR/ {print $NF}'</b> too.",
    setup:seedLog,
    check:(c)=>{ if(base(c.cmd)!=="awk")return false; const ls=c.out.split("\n").filter(Boolean); return ls.length>=3 && ls.every(l=>/^(INFO|WARN|ERROR)$/.test(l.trim())); },
    ok:"You slice structured text into exactly the column you need." },

  { belt:"brown", title:"Feed one command with another", sub:"xargs",
    prose:"Some commands read from stdin; others expect <em>arguments</em>. <code>xargs</code> bridges them — it takes a list on stdin and hands it to another command as arguments. Paired with <code>find</code>, it acts on many files at once: <code>find … | xargs wc -l</code> counts the lines of every file found.",
    task:"Count the lines of all log files at once: <b>find . -name \"*.log\" | xargs wc -l</b>.",
    hint:"Run <b>find . -name \"*.log\" | xargs wc -l</b>. find lists the files; xargs feeds them to wc as arguments.",
    setup:seedLogsTree,
    check:(c)=> c.cmd.includes("xargs")&&c.cmd.includes("find")&&/\d/.test(c.out),
    ok:"You chain discovery into action. This is real shell fluency." },

  { belt:"brown", title:"Grant permission", sub:"chmod",
    prose:"Every file carries <strong>permissions</strong> — who may read, write, or execute it. Run <code>ls -l</code> and read the leftmost column: <code>rwx</code> for the owner, then group, then others. A fresh script <code>script.sh</code> can't run yet — it lacks the execute (<code>x</code>) bit. <code>chmod +x FILE</code> grants it.",
    task:"Make <b>script.sh</b> executable with <b>chmod +x script.sh</b>.",
    hint:"Run <b>chmod +x script.sh</b>, then <b>ls -l script.sh</b> — the x bits appear (-rwxr-xr-x).",
    setup:seedScript,
    check:()=>{ const n=H("script.sh"); return !!n && ((n.mode||0)&0o100)!==0; },
    ok:"You control who may act on a file. The keys of the dojo are yours." },

  { belt:"slate", title:"Read a variable", sub:"$VAR",
    prose:"The shell keeps a set of <strong>environment variables</strong> — named values it carries with it, like <code>USER</code> and <code>HOME</code>. Write <code>$NAME</code> and the shell substitutes the value before the command runs. It is how programs learn who you are and where things live.",
    task:"Print your username by expanding a variable: <b>echo $USER</b>.",
    hint:"Run <b>echo $USER</b> — the shell replaces <code>$USER</code> with <code>student</code>. Try <b>echo $HOME</b> and <b>echo $SHELL</b> too.",
    check:(c)=> base(c.cmd)==="echo" && /\$/.test(c.cmd) && (/\bstudent\b/.test(c.out) || /\/home\/student/.test(c.out) || /\/bin\//.test(c.out)),
    ok:"The shell's memory is an open book to you." },

  { belt:"slate", title:"Set your own variable", sub:"export",
    prose:"You can add variables of your own. <code>export NAME=value</code> creates one and makes it available to the programs you run. (Plain <code>NAME=value</code> sets it for this shell only.) No spaces around the <code>=</code> — that matters.",
    task:"Create a variable named GREETING: <b>export GREETING=konnichiwa</b>.",
    hint:"Run <b>export GREETING=konnichiwa</b>. Nothing prints — but the value is now stored. Prove it with <b>echo $GREETING</b>.",
    check:(c)=> c.cmd.includes("GREETING") && typeof ENV.GREETING==="string" && ENV.GREETING.length>0,
    ok:"You shape the environment itself now, not just files." },

  { belt:"slate", title:"Quotes decide expansion", sub:"\"$VAR\"",
    prose:"Quoting changes everything here. Inside <strong>double quotes</strong> variables still expand: <code>\"hi $GREETING\"</code>. Inside <strong>single quotes</strong> they do <em>not</em> — <code>'$GREETING'</code> stays literal. Knowing which quote to reach for is a mark of real fluency.",
    task:"Build a sentence from your variable: <b>echo \"$GREETING, student\"</b>.",
    hint:"Run <b>echo \"$GREETING, student\"</b> — it prints <code>konnichiwa, student</code>. Now compare <b>echo '$GREETING'</b>, which prints the literal text.",
    setup:seedGreeting,
    check:(c)=> c.cmd.includes("$GREETING") && /konnichiwa/.test(c.out),
    ok:"You wield quotes with intent. The subtle art is yours." },

  { belt:"slate", title:"Survey the environment", sub:"env",
    prose:"To see every variable at once, run <code>env</code>. It prints the shell's whole environment — the values every program you launch will inherit. When something misbehaves, this is where you look first.",
    task:"List the entire environment with <b>env</b>.",
    hint:"Run <b>env</b>. You'll see <code>USER</code>, <code>HOME</code>, <code>PATH</code>, and the <code>GREETING</code> you added.",
    check:(c)=> base(c.cmd)==="env" && /HOME=/.test(c.out) && /USER=/.test(c.out),
    ok:"You see the whole world your commands live in. Nothing is hidden." },

  { belt:"red", title:"Reach across the network", sub:"curl",
    prose:"Not all data lives on your disk. <code>curl</code> fetches the contents of a URL straight to your terminal — and because it writes to standard output, it pipes into anything. <code>curl -s</code> runs silently. Fetch a remote log and filter it in one motion. <em>(This dojo is sandboxed, so a small set of practice URLs is served offline — real <code>curl</code> reaches the live internet.)</em>",
    task:"Fetch a remote log and keep only failures: <b>curl -s https://dojo.test/server.log | grep ERROR</b>.",
    hint:"Run <b>curl -s https://dojo.test/server.log | grep ERROR</b>. Add <b>| wc -l</b> to count them. Try <b>curl -s https://dojo.test/scroll.txt</b> too.",
    check:(c)=> c.cmd.includes("curl") && c.cmd.includes("grep") && /ERROR/.test(c.out),
    ok:"Disk or network, it is all just a stream to you." },

  { belt:"red", title:"Query structured data", sub:"jq",
    prose:"The web speaks <strong>JSON</strong> — nested data, not flat lines — so <code>grep</code> and <code>cut</code> fall short. <code>jq</code> queries it with a path filter: <code>.key</code> drills in, <code>.array[]</code> spreads its elements onto separate lines, and <code>| length</code> counts. Fetch the dojo's belt list and pull it apart.",
    task:"Fetch the belts JSON and extract the belts array: <b>curl -s https://api.dojo.test/belts.json | jq '.belts'</b>.",
    hint:"Run <b>curl -s https://api.dojo.test/belts.json | jq '.belts'</b>. Then try <b>jq '.belts | length'</b> or <b>jq -r '.belts[0]'</b>.",
    check:(c)=> c.cmd.includes("jq") && /white/.test(c.out) && /black/.test(c.out),
    ok:"Nested data holds no fear for you. jq bends JSON to your will." },

  { belt:"red", title:"Two names, one file", sub:"ln",
    prose:"A <strong>link</strong> lets one file answer to more than one name. <code>ln -s TARGET NAME</code> creates a <em>symbolic</em> link — a signpost pointing at the target. In <code>ls -l</code> it shows as <code>name -&gt; target</code>, and reading it reads through to the original.",
    task:"Create a symlink <b>latest.log</b> pointing at server.log: <b>ln -s server.log latest.log</b>.",
    hint:"Run <b>ln -s server.log latest.log</b>, then <b>ls -l latest.log</b> to see the arrow, and <b>cat latest.log</b> to read through it.",
    setup:seedLog,
    check:()=>{ const n=H("latest.log"); return !!n && n.type==="link"; },
    ok:"One file, many doorways. You understand links." },

  { belt:"red", title:"Weigh your disk usage", sub:"du",
    prose:"<code>du</code> (\"disk usage\") reports how much space files and folders occupy. <code>-s</code> gives a single summary total instead of every subdirectory; <code>-h</code> prints human-readable sizes (K, M) instead of raw blocks. Together, <code>du -sh</code> is the everyday way to ask \"how big is this?\"",
    task:"Summarize the size of your home directory: <b>du -sh .</b>.",
    hint:"Run <b>du -sh .</b> — one line: a size followed by the path.",
    check:(c)=> base(c.cmd)==="du" && /\d/.test(c.out),
    ok:"You know the weight of what you carry." },

  { belt:"red", title:"Check the free space", sub:"df",
    prose:"Where <code>du</code> weighs your files, <code>df</code> (\"disk free\") reports the whole filesystem — total size, used, and available. <code>df -h</code> shows friendly units. When a disk fills up, this is the first command you reach for.",
    task:"Show filesystem usage in human units: <b>df -h</b>.",
    hint:"Run <b>df -h</b>. Read the <code>Avail</code> and <code>Use%</code> columns.",
    check:(c)=> base(c.cmd)==="df" && /dojofs|Filesystem/.test(c.out),
    ok:"You keep an eye on the ground you stand on." },

  { belt:"red", title:"See what's running", sub:"ps",
    prose:"A machine is never idle — <strong>processes</strong> are always running. <code>ps</code> shows a snapshot of them. <code>ps aux</code> is the classic full view: every process, its owner, and how much CPU and memory it uses. Pipe it into <code>grep</code> to hunt for one.",
    task:"List all running processes: <b>ps aux</b>.",
    hint:"Run <b>ps aux</b>. Try <b>ps aux | grep dojo</b> to find a single process.",
    check:(c)=> base(c.cmd)==="ps" && /dojo/.test(c.out),
    ok:"You see the living machine, not just its files. The system holds no secrets now." },

  { belt:"rose", title:"Send a task to the background", sub:"&",
    prose:"A command normally holds your shell until it finishes. End the line with an ampersand <code>&</code> and it runs in the <strong>background</strong> instead — the shell prints <code>[job]&nbsp;pid</code> and hands control straight back to you. <code>sleep</code> just waits for N seconds, a perfect stand-in for a long-running task.",
    task:"Start a background job: <b>sleep 30 &</b>.",
    hint:"Type <b>sleep 30 &</b>. The shell prints something like <code>[1] 1743</code> and returns immediately — then try <b>jobs</b>.",
    check:(c)=> c.cmd.includes("&") && runningJobs().length>0,
    ok:"Your work runs while you keep moving. This is multitasking." },

  { belt:"rose", title:"List your background jobs", sub:"jobs",
    prose:"Once tasks run in the background, <code>jobs</code> shows them — each with a job number in <code>[brackets]</code>, its state (<em>Running</em>), and the command. That job number is how you refer back to it.",
    task:"List your running jobs with <b>jobs</b>.",
    hint:"Run <b>jobs</b>. Each line starts with a <code>[number]</code> — that's the handle you'll use to control it. (Try <b>ps</b> too; the job appears there.)",
    setup:seedJob,
    check:(c)=> base(c.cmd)==="jobs" && /Running/.test(c.out),
    ok:"You keep account of everything you have set in motion." },

  { belt:"rose", title:"Stop a process", sub:"kill",

/* ===================================================================
   STATE + PERSISTENCE
   =================================================================== */
const STORE_KEY="terminal-dojo-v1";
let completed=new Set();
let activeIdx=0;
let history=[];
let histPos=0;

function loadState(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){ const d=JSON.parse(raw); completed=new Set(d.completed||[]); activeIdx=d.active||0; }
  }catch(e){}
}
function saveState(){
  try{ localStorage.setItem(STORE_KEY,JSON.stringify({completed:[...completed],active:activeIdx})); }catch(e){}
}
function isUnlocked(i){ return i===0 || completed.has(i-1) || completed.has(i); }
function currentBeltKey(){
  // highest belt reached = belt of the furthest completed lesson (or first)
  let idx=-1;
  for(let i=0;i<LESSONS.length;i++) if(completed.has(i)) idx=i;
  const lessonIdx = idx>=0 ? Math.min(idx, LESSONS.length-1) : 0;
  // rank = belt of next lesson to do, or black if all done
  if(completed.size===LESSONS.length) return "black";
  const firstIncomplete=LESSONS.findIndex((_,i)=>!completed.has(i));
  return LESSONS[firstIncomplete<0?LESSONS.length-1:firstIncomplete].belt;
}

/* ===================================================================
   TERMINAL DOM
   =================================================================== */
const termBody=document.getElementById("termBody");
const inputLine=document.getElementById("inputLine");
const cmdInput=document.getElementById("cmdInput");
const ps1El=document.getElementById("ps1");

function promptStr(){
  const shown= cwd===HOME? "~" : cwd.startsWith(HOME+"/")? "~"+cwd.slice(HOME.length) : cwd;
  return {user:"student@dojo",path:shown};
}
function renderPS1(){
  const p=promptStr();
  ps1El.innerHTML='<span class="l-prompt">'+p.user+'</span>:<span class="l-path">'+esc(p.path)+'</span>$&nbsp;';
}
function appendLine(html,cls){
  const div=document.createElement("div");
  div.className="line"+(cls?" "+cls:"");
  div.innerHTML=html;
  termBody.insertBefore(div,inputLine);
}
function appendEcho(cmd){
  const p=promptStr();
  appendLine('<span class="l-prompt">'+p.user+'</span>:<span class="l-path">'+esc(p.path)+'</span>$ <span class="l-cmd">'+esc(cmd)+'</span>');
}
function scrollDown(){ termBody.scrollTop=termBody.scrollHeight; }

function handleCommand(raw){
  const cmd=raw.trim();
  appendEcho(raw);
  if(cmd!=="") { history.push(cmd); }
  histPos=history.length;
  if(cmd===""){ renderPS1(); scrollDown(); return; }

  const result=runLine(cmd);
  if(result.clear){
    // remove all lines except input
    [...termBody.querySelectorAll(".line")].forEach(n=>n.remove());
    renderPS1(); scrollDown(); afterCommand(cmd,result); return;
  }
  if(result.html && result.html.length){
    appendLine(result.html.replace(/\n$/,""));
  }
  if(result.err && result.err.length){
    appendLine('<span class="l-err">'+esc(result.err.replace(/\n$/,""))+'</span>');
  }
  renderPS1();
  scrollDown();
  afterCommand(cmd,result);
}

function afterCommand(cmd,result){
  // build check context — out is stdout only (plain), so error text doesn't leak into checks
  const ctx={ cmd, out: (result.plain!=null ? result.plain : stripTags(result.html||"")), cwd };
  const lesson=LESSONS[activeIdx];
  if(lesson && !completed.has(activeIdx)){
    let pass=false;
    try{ pass=lesson.check(ctx); }catch(e){ pass=false; }
    if(pass) passLesson(activeIdx);
  }
}

/* ===================================================================
   LESSON FLOW
   =================================================================== */
function passLesson(i){
  const wasBelt=currentBeltKey();
  completed.add(i);
  saveState();
  celebrate();
  const term=document.getElementById("term");
  term.classList.remove("flash"); void term.offsetWidth; term.classList.add("flash");
  renderBelts(); renderKataList(); renderBrief(); renderRank();
  // auto-advance active pointer to next incomplete
  const next=LESSONS.findIndex((_,k)=>!completed.has(k));
  if(next>=0){ /* stay until user clicks, but mark banner */ }
}

function celebrate(){
  const el=document.getElementById("celebrate");
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),1700);
}

function setActive(i){
  if(!isUnlocked(i)) return;
  activeIdx=i;
  saveState();
  runSetup(i);
  renderKataList();
  renderBrief();
  cmdInput.focus();
}
function runSetup(i){ const l=LESSONS[i]; if(l&&l.setup){ try{l.setup();}catch(e){} } }

/* ===================================================================
   RENDER: belts, kata list, brief, rank
   =================================================================== */
const beltTrack=document.getElementById("beltTrack");
const kataList=document.getElementById("kataList");
const briefEl=document.getElementById("brief");

function lessonsOfBelt(key){ return LESSONS.map((l,i)=>({l,i})).filter(x=>x.l.belt===key); }

function renderBelts(){
  const curKey=currentBeltKey();
  const curIdx=beltIndex(curKey);
  beltTrack.innerHTML="";
  BELTS.forEach((b,bi)=>{
    const items=lessonsOfBelt(b.key);
    const done=items.filter(x=>completed.has(x.i)).length;
    const reached= bi<=curIdx || done>0;
    const row=document.createElement("div");
    row.className="belt-row"+(reached?" reached":"")+(b.key===curKey?" current":"");
    row.innerHTML=
      '<span class="belt-chip" style="background:'+b.color+'"></span>'+
      '<span class="belt-name">'+b.name+' belt</span>'+
      '<span class="belt-prog">'+done+'/'+items.length+'</span>';
    beltTrack.appendChild(row);
  });
}

function renderKataList(){
  kataList.innerHTML="";
  let lastBelt=null;
  LESSONS.forEach((l,i)=>{
    if(l.belt!==lastBelt){
      const h=document.createElement("h2");
      h.textContent=(BELTS.find(b=>b.key===l.belt).name)+" belt";
      kataList.appendChild(h);
      lastBelt=l.belt;
    }
    const unlocked=isUnlocked(i);
    const done=completed.has(i);
    const el=document.createElement("div");
    el.className="kata"+(i===activeIdx?" active":"")+(done?" done":"")+(unlocked?"":" locked");
    el.setAttribute("role","button");
    el.setAttribute("tabindex", unlocked?"0":"-1");
    el.innerHTML=
      '<span class="mark">'+(done?"✓":(unlocked?(i+1):"🔒"))+'</span>'+
      '<span class="k-body"><span class="k-title">'+l.title+'</span>'+
      '<span class="k-sub">'+esc(l.sub)+'</span></span>';
    if(unlocked){
      el.addEventListener("click",()=>setActive(i));
      el.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();setActive(i);}});
    }
    kataList.appendChild(el);
  });
}

function renderBrief(){
  const l=LESSONS[activeIdx];
  const b=BELTS.find(x=>x.key===l.belt);
  const done=completed.has(activeIdx);
  const allDone=completed.size===LESSONS.length;
  const txtColor = l.belt==="white"||l.belt==="yellow"?"#20242B":"#fff";
  let html="";
  html+='<div class="b-head">';
  html+='<span class="belt-tag" style="background:'+b.color+';color:'+txtColor+'">'+b.name+' belt · '+esc(l.sub)+'</span>';
  html+='</div>';
  html+='<h2>'+l.title+'</h2>';
  html+='<p class="prose">'+l.prose+'</p>';
  html+='<div class="task"><span class="t-icon">▸</span><div class="t-body">'+
        '<div class="t-lbl">Your kata</div><div class="t-text">'+l.task+'</div></div></div>';
  html+='<div class="brief-actions">'+
        '<button class="btn hint" id="hintBtn">Show a hint</button>'+
        '<button class="btn" id="resetLessonBtn">Reset this kata</button>';
  const next=activeIdx+1;
  if(done && next<LESSONS.length){
    html+='<button class="btn primary" id="nextBtn">Next kata →</button>';
  }
  html+='</div>';
  html+='<div class="hint-box" id="hintBox"><b>Hint · </b>'+l.hint+'</div>';
  if(done){
    html+='<div class="completed-banner show"><span style="font-size:20px">🥋</span>'+
          '<span class="cb-txt"><b>Kata passed.</b> '+l.ok+
          (allDone?'<div class="final-note">All belts earned. You have walked the full path — from knowing where you stand to combining every technique in one motion. The shell is yours now.</div>':'')+
          '</span></div>';
  }
  briefEl.innerHTML=html;

  const hb=document.getElementById("hintBtn");
  if(hb) hb.addEventListener("click",()=>{document.getElementById("hintBox").classList.toggle("show");});
  const rl=document.getElementById("resetLessonBtn");
  if(rl) rl.addEventListener("click",()=>resetLesson());
  const nb=document.getElementById("nextBtn");
  if(nb) nb.addEventListener("click",()=>setActive(activeIdx+1));
}

function renderRank(){
  const key=currentBeltKey();
  const b=BELTS.find(x=>x.key===key);
  document.getElementById("rankName").textContent=b.name+" belt";
  document.getElementById("rankSwatch").style.background=b.color;
}

function resetLesson(){
  // re-run setup for the lesson to restore its starting files, and (if it was a create/delete lesson) allow retry
  const l=LESSONS[activeIdx];
  // undo completion so learner can redo
  completed.delete(activeIdx);
  // restore files this lesson may have removed/added
  restoreLessonFiles(activeIdx);
  saveState();
  renderBelts(); renderKataList(); renderBrief(); renderRank();
  appendLine('<span class="l-dim">— kata reset — starting files restored —</span>');
  scrollDown();
}
function restoreLessonFiles(i){
  // simplest robust approach: reseed base + re-run setups of all lessons up to needed
  // but preserve user's created dirs. We re-run this lesson's setup only.
  const l=LESSONS[i];
  if(l.setup){ try{l.setup();}catch(e){} }
  // special cases where lesson deletes/renames source files:
  if(l.sub==="mv"){ if(!H("draft.txt")&&!H("final.txt")) writeFile(HOME+"/draft.txt","first attempt\n"); }
  if(l.sub==="rm"){ if(!H("temp.log")) writeFile(HOME+"/temp.log","junk\n"); }
}

/* ===================================================================
   INPUT HANDLING
   =================================================================== */
cmdInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    const v=cmdInput.value;
    cmdInput.value="";
    handleCommand(v);
  } else if(e.key==="ArrowUp"){
    e.preventDefault();
    if(history.length){ histPos=Math.max(0,histPos-1); cmdInput.value=history[histPos]||""; moveCaretEnd(); }
  } else if(e.key==="ArrowDown"){
    e.preventDefault();
    if(histPos<history.length){ histPos++; cmdInput.value=history[histPos]||""; moveCaretEnd(); }
  } else if(e.key==="Tab"){
    e.preventDefault();
    tabComplete();
  } else if(e.key==="l"&&e.ctrlKey){
    e.preventDefault();
    [...termBody.querySelectorAll(".line")].forEach(n=>n.remove());
    renderPS1();
  }
});
function moveCaretEnd(){ const v=cmdInput.value; cmdInput.setSelectionRange(v.length,v.length); }
function tabComplete(){
  const val=cmdInput.value;
  const toks=val.split(/\s+/);
  const last=toks[toks.length-1];
  let candidates=[];
  if(toks.length<=1){
    candidates=Object.keys(CMDS).filter(c=>c.startsWith(last));
  } else {
    const dir=getNode(cwd);
    if(dir&&dir.type==="dir"){
      candidates=Object.keys(dir.children).filter(n=>n.startsWith(last));
    }
  }
  if(candidates.length===1){
    toks[toks.length-1]=candidates[0]+(getNode(resolve(cwd,candidates[0]))&&getNode(resolve(cwd,candidates[0])).type==="dir"&&toks.length>1?"/":"");
    cmdInput.value=toks.join(" ");
  } else if(candidates.length>1){
    appendEcho(val);
    appendLine('<span class="l-dim">'+candidates.map(esc).join("   ")+'</span>');
    scrollDown();
  }
}

// clicking the terminal focuses input
termBody.addEventListener("click",()=>{ if(!window.getSelection().toString()) cmdInput.focus(); });

/* ===================================================================
   BOOT
   =================================================================== */
function bootSequence(){
  const reduce=window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  const lines=[
    {h:'<span class="l-ok">Terminal Dojo</span> <span class="l-dim">v1.0 — training shell</span>'},
    {h:'<span class="l-dim">A safe, in-memory sandbox. Nothing here can harm a real machine.</span>'},
    {h:'<span class="l-dim">Type</span> help <span class="l-dim">to see every command, or</span> man &lt;cmd&gt; <span class="l-dim">for details.</span>'},
    {h:'<span class="l-amber">Follow the kata in the left scroll. Bow in, and begin.</span>'},
    {h:'&nbsp;'},
  ];
  let i=0;
  const emit=()=>{
    if(i<lines.length){ appendLine(lines[i].h); i++; scrollDown(); setTimeout(emit,reduce?0:230); }
    else { renderPS1(); cmdInput.focus(); }
  };
  emit();
}

function initTheme(){
  const btn=document.getElementById("themeBtn");
  btn.addEventListener("click",()=>{
    const cur=document.documentElement.getAttribute("data-theme");
    const sysDark=window.matchMedia("(prefers-color-scheme:dark)").matches;
    let next;
    if(cur){ next= cur==="dark"?"light":"dark"; }
    else { next= sysDark?"light":"dark"; }
    document.documentElement.setAttribute("data-theme",next);
    try{ localStorage.setItem("terminal-dojo-theme",next); }catch(e){}
  });
  try{ const t=localStorage.getItem("terminal-dojo-theme"); if(t) document.documentElement.setAttribute("data-theme",t); }catch(e){}
}

function initResetAll(){
  document.getElementById("resetAllBtn").addEventListener("click",()=>{
    completed=new Set(); activeIdx=0; cwd=HOME; history=[]; histPos=0;
    seedFS();
    // seed all lesson files so exploration works from anywhere
    LESSONS.forEach(l=>{ if(l.setup){try{l.setup();}catch(e){}} });
    try{ localStorage.removeItem(STORE_KEY); }catch(e){}
    [...termBody.querySelectorAll(".line")].forEach(n=>n.remove());
    renderBelts(); renderKataList(); renderBrief(); renderRank();
    appendLine('<span class="l-dim">— all progress reset — the dojo is swept clean —</span>');
    renderPS1(); scrollDown(); cmdInput.focus();
  });
}

function init(){
  seedFS();
  loadState();
  // ensure files for all lessons up to and including active exist
  LESSONS.forEach(l=>{ if(l.setup){try{l.setup();}catch(e){}} });
  // recreate mv/rm starting states only if that lesson not yet completed
  if(!completed.has(LESSONS.findIndex(l=>l.sub==="mv"))){ if(!H("final.txt")&&!H("draft.txt")) writeFile(HOME+"/draft.txt","first attempt\n"); }
  if(!completed.has(LESSONS.findIndex(l=>l.sub==="rm"))){ if(!H("temp.log")) writeFile(HOME+"/temp.log","junk\n"); }

  initTheme();
  initResetAll();
  renderBelts(); renderKataList(); renderBrief(); renderRank();
  bootSequence();
}
init();

})();
</script>
