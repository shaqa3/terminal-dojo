<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Terminal Dojo — learn Linux hands-on through 54 belt-ranked kata in a real in-browser shell sandbox.">
<title>Terminal Dojo</title>
<style>
  /* ============================ TOKENS ============================ */
  :root{
    --paper:#EFEAE0; --paper-2:#F5F1E8; --paper-3:#E7E1D4;
    --ink:#20242B; --ink-2:#4A515C; --ink-3:#79808C;
    --line:#D8D2C4; --line-strong:#C6BFAD;
    --indigo:#3A4FB8; --indigo-soft:#5468d6;
    --jade:#0E9E6A; --amber:#B87A16; --vermilion:#D6482C;
    --seal:#C63B23;
    --shadow:0 1px 2px rgba(30,26,20,.06),0 8px 28px rgba(30,26,20,.10);
    --font-mono:ui-monospace,"SF Mono","Cascadia Code","JetBrains Mono",Menlo,Consolas,monospace;
    --font-serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    color-scheme:light;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#12151C; --paper-2:#171B24; --paper-3:#1E2431;
      --ink:#DCE3EC; --ink-2:#98A2B0; --ink-3:#69727F;
      --line:#28303C; --line-strong:#333c4a;
      --indigo:#8AA0FF; --indigo-soft:#7488f0;
      --jade:#46E0A6; --amber:#E6B34A; --vermilion:#F0603F;
      --seal:#E14A30;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 34px rgba(0,0,0,.45);
      color-scheme:dark;
    }
  }
  :root[data-theme="light"]{
    --paper:#EFEAE0; --paper-2:#F5F1E8; --paper-3:#E7E1D4;
    --ink:#20242B; --ink-2:#4A515C; --ink-3:#79808C;
    --line:#D8D2C4; --line-strong:#C6BFAD;
    --indigo:#3A4FB8; --indigo-soft:#5468d6;
    --jade:#0E9E6A; --amber:#B87A16; --vermilion:#D6482C; --seal:#C63B23;
    --shadow:0 1px 2px rgba(30,26,20,.06),0 8px 28px rgba(30,26,20,.10);
    color-scheme:light;
  }
  :root[data-theme="dark"]{
    --paper:#12151C; --paper-2:#171B24; --paper-3:#1E2431;
    --ink:#DCE3EC; --ink-2:#98A2B0; --ink-3:#69727F;
    --line:#28303C; --line-strong:#333c4a;
    --indigo:#8AA0FF; --indigo-soft:#7488f0;
    --jade:#46E0A6; --amber:#E6B34A; --vermilion:#F0603F; --seal:#E14A30;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 34px rgba(0,0,0,.45);
    color-scheme:dark;
  }

  /* Terminal screen — committed to its own dark world in both themes */
  :root{
    --scr-bg:#0B0E13; --scr-bg2:#0F131A; --scr-fg:#C6D3D0; --scr-dim:#6C7A82;
    --scr-jade:#4FE6AB; --scr-amber:#F0C05A; --scr-red:#FF6A4D; --scr-blue:#8FB2FF;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--font-serif);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow:hidden;
  }
  ::selection{background:color-mix(in srgb,var(--indigo) 35%,transparent)}

  .app{
    height:100vh; display:grid;
    grid-template-rows:auto 1fr;
    max-width:1500px; margin:0 auto;
  }

  /* ============================ LINTEL (header) ============================ */
  .lintel{
    display:flex; align-items:center; gap:18px;
    padding:14px 22px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(var(--paper-2),var(--paper));
  }
  .seal{
    flex:none; width:46px; height:46px; border-radius:9px;
    background:var(--seal); color:#fff;
    display:grid; place-items:center;
    font-family:var(--font-serif); font-size:26px; line-height:1;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.25), var(--shadow);
    transform:rotate(-3deg);
    position:relative;
  }
  .seal::after{content:"";position:absolute;inset:4px;border:1px solid rgba(255,255,255,.35);border-radius:5px}
  .brand{display:flex;flex-direction:column;gap:2px;min-width:0}
  .brand h1{
    margin:0; font-family:var(--font-mono); font-weight:600;
    font-size:20px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink); white-space:nowrap;
  }
  .brand h1 .dot{color:var(--vermilion)}
  .brand .tag{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--ink-3);
  }
  .lintel-right{margin-left:auto; display:flex; align-items:center; gap:16px}
  .rank{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .rank .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3)}
  .rank .val{font-family:var(--font-mono);font-size:13px;letter-spacing:.06em;color:var(--ink);display:flex;align-items:center;gap:8px}
  .rank .swatch{width:26px;height:11px;border-radius:2px;border:1px solid rgba(0,0,0,.25);box-shadow:inset 0 -3px 0 rgba(0,0,0,.14)}
  .icon-btn{
    appearance:none;border:1px solid var(--line-strong);background:var(--paper-2);
    color:var(--ink-2);border-radius:8px;width:36px;height:36px;cursor:pointer;
    font-size:15px;display:grid;place-items:center;transition:.15s;
  }
  .icon-btn:hover{color:var(--ink);border-color:var(--indigo)}
  .icon-btn:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}

  /* ============================ MAIN ============================ */
  .main{
    display:grid; grid-template-columns:minmax(320px,420px) 1fr;
    min-height:0; gap:0;
  }
  .scroll{
    border-right:1px solid var(--line);
    display:flex; flex-direction:column; min-height:0;
    background:
      linear-gradient(var(--paper),var(--paper));
  }

  /* Belt progression rail */
  .belts{padding:16px 20px 12px;border-bottom:1px solid var(--line)}
  .belts h2{margin:0 0 12px;font-family:var(--font-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  .belt-track{display:flex;flex-direction:column;gap:3px}
  .belt-row{display:flex;align-items:center;gap:10px}
  .belt-chip{
    flex:none;width:34px;height:14px;border-radius:3px;
    border:1px solid rgba(0,0,0,.28);
    box-shadow:inset 0 -4px 0 rgba(0,0,0,.13);
    opacity:.34;transition:.3s;
  }
  .belt-row.reached .belt-chip{opacity:1}
  .belt-row .belt-name{font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;color:var(--ink-3);text-transform:capitalize}
  .belt-row.reached .belt-name{color:var(--ink)}
  .belt-row .belt-prog{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--ink-3);font-variant-numeric:tabular-nums}
  .belt-row.current .belt-name{color:var(--indigo);font-weight:600}
  .belt-row.current::after{content:"◂";color:var(--indigo);font-size:11px}

  /* Lesson list */
  .kata-list{overflow-y:auto;flex:1;min-height:0;padding:8px 12px 20px}
  .kata-list h2{margin:14px 8px 8px;font-family:var(--font-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  .kata{
    display:flex;align-items:flex-start;gap:10px;
    padding:9px 10px;border-radius:8px;cursor:pointer;
    border:1px solid transparent;transition:.12s;
  }
  .kata:hover{background:var(--paper-2)}
  .kata.active{background:var(--paper-2);border-color:var(--line-strong)}
  .kata.locked{cursor:not-allowed;opacity:.42}
  .kata .mark{
    flex:none;width:20px;height:20px;border-radius:50%;
    border:1.5px solid var(--line-strong);
    display:grid;place-items:center;font-size:11px;margin-top:1px;
    font-family:var(--font-mono);color:var(--ink-3);
  }
  .kata.done .mark{background:var(--jade);border-color:var(--jade);color:#04150E}
  .kata.active .mark{border-color:var(--indigo);color:var(--indigo)}
  .kata .k-body{min-width:0}
  .kata .k-title{font-family:var(--font-mono);font-size:12.5px;color:var(--ink);letter-spacing:.02em}
  .kata.locked .k-title{color:var(--ink-3)}
  .kata .k-sub{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);margin-top:2px}

  /* ============================ LESSON PANEL (bottom of scroll would overflow) ============================ */
  /* Instead lesson brief sits in its own scrollable region below list via layout swap on wide screens */

  /* ============================ TRAINING FLOOR ============================ */
  .floor{display:flex;flex-direction:column;min-height:0;background:var(--paper-3)}
  .brief{
    padding:18px 24px 16px;border-bottom:1px solid var(--line);
    background:linear-gradient(var(--paper-2),var(--paper));
    max-height:42%; overflow-y:auto;
  }
  .brief .b-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .belt-tag{
    font-family:var(--font-mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;
    padding:3px 9px;border-radius:20px;color:#fff;font-weight:600;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.15);
  }
  .brief h2{margin:0;font-family:var(--font-serif);font-size:23px;font-weight:600;color:var(--ink);letter-spacing:-.01em;text-wrap:balance}
  .brief .prose{font-family:var(--font-serif);font-size:15.5px;line-height:1.62;color:var(--ink-2);max-width:62ch;margin:10px 0 0}
  .brief .prose code{
    font-family:var(--font-mono);font-size:.86em;
    background:color-mix(in srgb,var(--indigo) 14%,var(--paper-3));
    color:var(--indigo);padding:1px 6px;border-radius:5px;
  }
  .brief .prose strong{color:var(--ink)}
  .task{
    display:flex;align-items:flex-start;gap:12px;margin-top:16px;
    padding:13px 15px;border-radius:10px;
    background:var(--paper-3);border:1px solid var(--line-strong);
    border-left:3px solid var(--indigo);
  }
  .task .t-icon{font-family:var(--font-mono);color:var(--indigo);font-size:13px;margin-top:1px}
  .task .t-body{min-width:0}
  .task .t-lbl{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin-bottom:3px}
  .task .t-text{font-family:var(--font-mono);font-size:13.5px;line-height:1.5;color:var(--ink)}
  .task .t-text b{color:var(--indigo);font-weight:600}
  .brief-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .btn{
    appearance:none;cursor:pointer;font-family:var(--font-mono);
    font-size:11.5px;letter-spacing:.05em;padding:7px 13px;border-radius:7px;
    border:1px solid var(--line-strong);background:var(--paper-2);color:var(--ink-2);transition:.13s;
  }
  .btn:hover{color:var(--ink);border-color:var(--ink-3)}
  .btn:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  .btn.hint:hover{border-color:var(--amber);color:var(--amber)}
  .btn.primary{background:var(--indigo);border-color:var(--indigo);color:#fff}
  .btn.primary:hover{filter:brightness(1.08);color:#fff}
  .hint-box{
    margin-top:12px;padding:11px 14px;border-radius:9px;
    border:1px dashed var(--amber);
    background:color-mix(in srgb,var(--amber) 12%,transparent);
    font-family:var(--font-mono);font-size:12.5px;line-height:1.55;color:var(--ink);
    display:none;
  }
  .hint-box.show{display:block}
  .hint-box b{color:var(--amber)}

  /* Terminal window */
  .term-wrap{flex:1;min-height:0;padding:16px 20px 20px;display:flex}
  .term{
    flex:1;min-height:0;display:flex;flex-direction:column;
    background:var(--scr-bg);border-radius:12px;overflow:hidden;
    box-shadow:var(--shadow),inset 0 0 0 1px rgba(255,255,255,.04);
    border:1px solid #05070a;
  }
  .term-bar{
    display:flex;align-items:center;gap:8px;padding:10px 14px;
    background:var(--scr-bg2);border-bottom:1px solid #05070a;
  }
  .term-bar .dots{display:flex;gap:6px}
  .term-bar .dots i{width:11px;height:11px;border-radius:50%;display:block}
  .dots i:nth-child(1){background:#FF5F57}.dots i:nth-child(2){background:#FEBC2E}.dots i:nth-child(3){background:#28C840}
  .term-bar .title{margin:0 auto;font-family:var(--font-mono);font-size:11px;color:var(--scr-dim);letter-spacing:.04em;transform:translateX(-16px)}
  .term-body{
    flex:1;min-height:0;overflow-y:auto;padding:14px 16px;
    font-family:var(--font-mono);font-size:13.5px;line-height:1.55;
    color:var(--scr-fg);
  }
  .term-body::-webkit-scrollbar{width:10px}
  .term-body::-webkit-scrollbar-thumb{background:#20272f;border-radius:6px;border:2px solid var(--scr-bg)}
  .line{white-space:pre-wrap;word-break:break-word}
  .l-prompt{color:var(--scr-jade)}
  .l-path{color:var(--scr-blue)}
  .l-cmd{color:var(--scr-fg)}
  .l-err{color:var(--scr-red)}
  .l-dim{color:var(--scr-dim)}
  .l-dir{color:var(--scr-blue);font-weight:600}
  .l-ok{color:var(--scr-jade)}
  .l-amber{color:var(--scr-amber)}
  .l-match{color:var(--scr-amber);font-weight:600}
  .inputline{display:flex;align-items:baseline;gap:0;font-family:var(--font-mono);font-size:13.5px}
  .inputline .ps1{white-space:pre;flex:none}
  .cmd-input{
    flex:1;background:transparent;border:none;outline:none;color:var(--scr-fg);
    font-family:var(--font-mono);font-size:13.5px;caret-color:var(--scr-jade);padding:0;
  }
  .cursor-blink{display:inline-block;width:8px;height:15px;background:var(--scr-jade);
    vertical-align:text-bottom;animation:blink 1.05s steps(1) infinite;margin-left:1px}
  @keyframes blink{50%{opacity:0}}

  /* success celebration */
  .celebrate{
    position:absolute;left:50%;top:12px;transform:translateX(-50%);
    background:var(--jade);color:#04150E;font-family:var(--font-mono);
    font-size:12.5px;letter-spacing:.04em;font-weight:600;
    padding:9px 18px;border-radius:24px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:8px;z-index:20;
    opacity:0;pointer-events:none;transition:.3s;
  }
  .celebrate.show{opacity:1;transform:translateX(-50%) translateY(4px)}
  .floor{position:relative}

  .term.flash{animation:flash .5s ease}
  @keyframes flash{0%,100%{box-shadow:var(--shadow),inset 0 0 0 1px rgba(255,255,255,.04)}
    35%{box-shadow:0 0 0 3px var(--jade),inset 0 0 40px rgba(79,230,171,.18)}}

  .completed-banner{
    margin-top:14px;padding:14px 16px;border-radius:10px;
    background:color-mix(in srgb,var(--jade) 16%,transparent);
    border:1px solid var(--jade);display:none;align-items:center;gap:12px;
  }
  .completed-banner.show{display:flex}
  .completed-banner .cb-txt{font-family:var(--font-mono);font-size:12.5px;color:var(--ink);line-height:1.5}
  .completed-banner .cb-txt b{color:var(--jade)}

  /* Final scroll (dojo graduation) */
  .final-note{font-family:var(--font-serif);font-style:italic;color:var(--ink-2);font-size:14px;margin-top:8px}

  @media (max-width:900px){
    body{overflow:auto}
    .app{height:auto}
    .main{grid-template-columns:1fr}
    .scroll{border-right:none;border-bottom:1px solid var(--line)}
    .kata-list{max-height:280px}
    .brief{max-height:none}
    .term-wrap{height:60vh}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms !important;transition-duration:.001ms !important}
    .cursor-blink{animation:none}
  }
</style>
</head>
<body>
<div class="app">
  <header class="lintel">
    <div class="seal" aria-hidden="true">道</div>
    <div class="brand">
      <h1>Terminal Dojo<span class="dot">.</span></h1>
      <span class="tag">Guided&nbsp;Linux&nbsp;Kata</span>
    </div>
    <div class="lintel-right">
      <div class="rank">
        <span class="lbl">Rank</span>
        <span class="val"><span class="swatch" id="rankSwatch"></span><span id="rankName">White belt</span></span>
      </div>
      <button class="icon-btn" id="themeBtn" title="Toggle light / dark" aria-label="Toggle theme">◐</button>
      <button class="icon-btn" id="resetAllBtn" title="Reset all progress" aria-label="Reset all progress">⟲</button>
    </div>
  </header>

  <div class="main">
    <aside class="scroll">
      <div class="belts">
        <h2>The Path of Belts</h2>
        <div class="belt-track" id="beltTrack"></div>
      </div>
      <nav class="kata-list" id="kataList" aria-label="Lessons"></nav>
    </aside>

    <section class="floor">
      <div class="celebrate" id="celebrate">✓ Kata passed</div>
      <div class="brief" id="brief"><!-- lesson brief injected --></div>
      <div class="term-wrap">
        <div class="term" id="term">
          <div class="term-bar">
            <span class="dots"><i></i><i></i><i></i></span>
            <span class="title">student@dojo — training floor</span>
          </div>
          <div class="term-body" id="termBody" tabindex="0">
            <div class="inputline" id="inputLine">
              <span class="ps1" id="ps1"></span>
              <input class="cmd-input" id="cmdInput" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Terminal input"/>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
(function(){
"use strict";

/* ===================================================================
   IN-MEMORY FILESYSTEM
   =================================================================== */
const HOME = "/home/student";
let root; // {type,children} tree

function newDir(){ return {type:"dir", children:{}}; }
function newFile(c){ return {type:"file", content:c==null?"":c}; }

function resolve(cwd, p){
  if(p==null||p==="") return cwd;
  if(p==="~") p=HOME;
  else if(p.startsWith("~/")) p=HOME+p.slice(1);
  let parts = p.startsWith("/") ? [] : cwd.split("/").filter(Boolean);
  for(const seg of p.split("/")){
    if(seg===""||seg===".") continue;
    if(seg===".."){ parts.pop(); }
    else parts.push(seg);
  }
  return "/"+parts.join("/");
}
function getNode(path){
  if(path==="/"||path==="") return root;
  const parts=path.split("/").filter(Boolean);
  let n=root;
  for(const seg of parts){
    if(!n||n.type!=="dir"||!n.children[seg]) return null;
    n=n.children[seg];
  }
  return n;
}
function deref(node){ let n=node,g=0; while(n&&n.type==="link"&&g++<40){ n=getNode(n.targetAbs); } return n; }
function parentOf(path){
  const parts=path.split("/").filter(Boolean);
  const name=parts.pop();
  const par=getNode("/"+parts.join("/"));
  return {par,name};
}
function mkdirp(path){
  const parts=path.split("/").filter(Boolean);
  let n=root;
  for(const seg of parts){
    if(!n.children[seg]) n.children[seg]=newDir();
    n=n.children[seg];
    if(n.type!=="dir") return null;
  }
  return n;
}
function writeFile(path,content){
  const {par,name}=parentOf(path);
  if(!par||par.type!=="dir") return false;
  par.children[name]=newFile(content);
  return true;
}

/* Seed the home directory fresh */
function seedFS(){
  root=newDir();
  mkdirp(HOME);
  mkdirp(HOME+"/projects");
  mkdirp(HOME+"/dojo");
  writeFile(HOME+"/README.txt",
    "Welcome to the Terminal Dojo.\nHere you learn the way of the shell by doing.\nEvery kata is a real command. Bow in, and begin.\n");
}

/* Convenience for lesson checks: resolve relative to HOME */
function H(p){ return getNode(resolve(HOME,p)); }

/* ===================================================================
   COMMAND PARSING + EXECUTION (real-ish shell)
   =================================================================== */
let cwd = HOME;

/* live process / job table (mutable) */
let JOBS=[]; let nextPid=1743;
function registerJob(cmd){ const job={pid:nextPid++, cmd:cmd.trim().replace(/\s*&\s*$/,""), state:"Running", start:"09:10"}; JOBS.push(job); return job; }
function runningJobs(){ return JOBS.filter(j=>j.state==="Running"); }

/* environment variables */
let ENV={
  USER:"student", HOME:HOME, SHELL:"/bin/bash", PWD:HOME,
  PATH:"/usr/local/bin:/usr/bin:/bin", LANG:"en_US.UTF-8", TERM:"xterm-256color",
  DOJO:"terminal-dojo"
};
function readVar(str,i){ // str[i] === '$'
  if(str[i+1]==="{"){ let j=i+2,name=""; while(j<str.length&&str[j]!=="}"){name+=str[j];j++;} return [ENV[name]!=null?ENV[name]:"", j]; }
  let j=i+1,name="";
  while(j<str.length&&/[A-Za-z0-9_]/.test(str[j])){ name+=str[j]; j++; }
  if(name==="") return ["$", i];
  return [ENV[name]!=null?ENV[name]:"", j-1];
}
function readParen(str,start){ // str[start] is first char after "$("
  let depth=1,j=start,inner="";
  while(j<str.length){
    const ch=str[j];
    if(ch==="(") depth++;
    else if(ch===")"){ depth--; if(depth===0) break; }
    inner+=ch; j++;
  }
  return [inner, j]; // j at the matching ')'
}
function runCmdSub(inner){
  try{ const r=runLine(inner.trim()); return r.plain!=null ? r.plain : stripTags(r.html||""); }
  catch(e){ return ""; }
}
function substFmt(text, inDquotes){
  let t=String(text).replace(/\n+$/,"");           // strip trailing newlines, like bash
  if(!inDquotes) t=t.replace(/\s*\n\s*/g," ");      // unquoted: collapse remaining newlines to spaces
  return t;
}
function readArith(str,i){ // str[i..i+2] === "$(("
  let j=i+3,pdepth=0,inner="";
  while(j<str.length){
    const ch=str[j];
    if(ch==="("){ pdepth++; inner+=ch; j++; continue; }
    if(ch===")"){ if(pdepth>0){ pdepth--; inner+=ch; j++; continue; } break; }
    inner+=ch; j++;
  }
  return [inner, j+1]; // j at first ')' of closing '))'; last consumed = j+1
}
function arithParse(s){
  let pos=0;
  const skip=()=>{ while(pos<s.length&&s[pos]===" ")pos++; };
  const peek=()=>s[pos];
  function factor(){ skip(); if(peek()==="("){pos++;const v=expr();skip();if(peek()===")")pos++;return v;} if(peek()==="-"){pos++;return -factor();} if(peek()==="+"){pos++;return factor();} let n=""; while(pos<s.length&&/[0-9]/.test(s[pos]))n+=s[pos++]; return n===""?0:parseInt(n,10); }
  function term(){ let v=factor(); skip(); while(peek()==="*"||peek()==="/"||peek()==="%"){ const op=s[pos++]; const r=factor(); v= op==="*"?v*r: op==="/"?(r===0?0:Math.trunc(v/r)) : (r===0?0:v%r); skip(); } return v; }
  function expr(){ let v=term(); skip(); while(peek()==="+"||peek()==="-"){ const op=s[pos++]; const r=term(); v= op==="+"?v+r:v-r; skip(); } return v; }
  return expr();
}
function evalArith(exprStr){
  const e=String(exprStr).replace(/\$?([A-Za-z_]\w*)/g,(m,name)=>{ const n=parseInt(ENV[name],10); return isNaN(n)?"0":String(n); });
  if(!/^[\d\s+\-*/%()]*$/.test(e)) return "0";
  try{ return String(arithParse(e)); }catch(_){ return "0"; }
}
function expandVars(str){
  ENV.PWD=cwd; ENV.HOME=HOME;
  let out="",q=null;
  for(let i=0;i<str.length;i++){
    const c=str[i];
    if(q==="'"){ out+=c; if(c==="'")q=null; continue; }
    // arithmetic expansion $(( ... ))  — check before $( command substitution
    if(c==="$" && str[i+1]==="(" && str[i+2]==="("){ const ar=readArith(str,i); out+=evalArith(ar[0]); i=ar[1]; continue; }
    // command substitution $( ... ) — active unquoted and inside double quotes
    if(c==="$" && str[i+1]==="("){ const pr=readParen(str,i+2); out+=substFmt(runCmdSub(pr[0]), q==='"'); i=pr[1]; continue; }
    if(c==="`"){ let end=str.indexOf("`",i+1); if(end<0)end=str.length; out+=substFmt(runCmdSub(str.slice(i+1,end)), q==='"'); i=end; continue; }
    if(q==='"'){ if(c==='"'){q=null;out+=c;continue;} if(c==="$"){const r=readVar(str,i);out+=r[0];i=r[1];continue;} out+=c; continue; }
    if(c==="'"){ q="'"; out+=c; continue; }
    if(c==='"'){ q='"'; out+=c; continue; }
    if(c==="$"){ const r=readVar(str,i); out+=r[0]; i=r[1]; continue; }
    out+=c;
  }
  return out;
}

function tokenize(str){
  const out=[]; let cur=""; let q=null; let has=false;
  for(let i=0;i<str.length;i++){
    const c=str[i];
    if(q){
      if(c===q){q=null;} else cur+=c;
      continue;
    }
    if(c==='"'||c==="'"){q=c;has=true;continue;}
    if(c===" "||c==="\t"){ if(has||cur!==""){out.push(cur);cur="";has=false;} continue; }
    cur+=c; has=true;
  }
  if(has||cur!=="") out.push(cur);
  return out;
}

/* tokenize but remember whether each token had glob chars OUTSIDE quotes */
function tokenizeArgs(str){
  const out=[]; let cur="",has=false,q=null,glob=false;
  for(let i=0;i<str.length;i++){
    const c=str[i];
    if(q){ if(c===q){q=null;} else cur+=c; continue; }
    if(c==='"'||c==="'"){ q=c; has=true; continue; }
    if(c===" "||c==="\t"){ if(has||cur!==""){out.push({text:cur,glob});cur="";has=false;glob=false;} continue; }
    if(c==="*"||c==="?") glob=true;
    cur+=c; has=true;
  }
  if(has||cur!=="") out.push({text:cur,glob});
  return out;
}

/* filename generation — expand a glob pattern (last path segment) against the FS */
function globMatch(pattern){
  const slash=pattern.lastIndexOf("/");
  const dirPart = slash>=0 ? pattern.slice(0,slash) : ".";
  const pat = slash>=0 ? pattern.slice(slash+1) : pattern;
  if(!/[*?]/.test(pat)) return [pattern];
  const dirNode=getNode(resolve(cwd,dirPart));
  if(!dirNode||dirNode.type!=="dir") return [];
  const rx=new RegExp("^"+pat.replace(/[.+^${}()|[\]\\]/g,"\\$&").replace(/\*/g,"[^/]*").replace(/\?/g,"[^/]")+"$");
  const names=Object.keys(dirNode.children).filter(n=>!n.startsWith(".")&&rx.test(n)).sort();
  return names.map(n=> slash>=0 ? dirPart+"/"+n : n);
}
function expandGlobs(rawToks){
  const toks=[];
  for(const tk of rawToks){
    if(tk.glob){ const m=globMatch(tk.text); if(m.length) toks.push(...m); else toks.push(tk.text); }
    else toks.push(tk.text);
  }
  return toks;
}

function fmtPerms(node){
  if(node.type==="link") return "lrwxrwxrwx";
  const m = node.mode!=null ? node.mode : (node.type==="dir"?0o755:0o644);
  const typ = node.type==="dir"?"d":"-";
  const bits=(n)=> ((n&4)?"r":"-")+((n&2)?"w":"-")+((n&1)?"x":"-");
  return typ+bits((m>>6)&7)+bits((m>>3)&7)+bits(m&7);
}
function pad(s,n){ s=String(s); return s.length>=n?s:s+" ".repeat(n-s.length); }
function padL(s,n){ s=String(s); return s.length>=n?s:" ".repeat(n-s.length)+s; }

function hostOf(url){ return url.replace(/^[a-z]+:\/\//i,"").split("/")[0]; }
function humanSize(b){
  if(b<1024) return b+"B";
  if(b<1024*1024) return (b/1024).toFixed(b<10240?1:0).replace(/\.0$/,"")+"K";
  return (b/1048576).toFixed(1)+"M";

// each command: fn(args, stdin) -> {out, err}
const CMDS={
  pwd(){ return {out:cwd+"\n",err:""}; },

  whoami(){ return {out:"student\n",err:""}; },

  echo(args){ return {out:args.join(" ")+"\n",err:""}; },

  help(){
    const names=Object.keys(MAN).sort().join("  ");
    return {out:"Commands available in the dojo:\n"+names+"\n\nType  man <command>  for a short description.\n",err:""};
  },

  man(args){
    if(!args[0]) return {out:"What manual page do you want?\n",err:""};
    const m=MAN[args[0]];
    return m?{out:m+"\n",err:""}:{out:"",err:"No manual entry for "+args[0]+"\n"};
  },

  clear(){ return {out:"",err:"",clear:true}; },

  ls(args){
    let long=false,all=false,one=false,targets=[];
    for(const a of args){
      if(a.startsWith("-")&&a!=="-"){
        for(const ch of a.slice(1)){
          if(ch==="l")long=true; else if(ch==="a")all=true; else if(ch==="1")one=true;
        }
      } else targets.push(a);
    }
    if(targets.length===0) targets=["."];
    let out="";
    const blocks=[];
    for(const t of targets){
      const path=resolve(cwd,t);
      const node=getNode(path);
      if(!node){ blocks.push({err:"ls: cannot access '"+t+"': No such file or directory\n"}); continue; }
      let names;
      if(node.type==="dir"){
        names=Object.keys(node.children);
        if(all) names=[".",".."].concat(names);
        names.sort((a,b)=>a.replace(/^\./,"").localeCompare(b.replace(/^\./,"")));
        if(!all) names=names.filter(n=>!n.startsWith("."));
      } else {
        names=[t];
      }
      const getChild=(nm)=> nm==="."?node : nm===".."?node : (node.type==="dir"?node.children[nm]:node);
      let block="";
      if(long){
        if(node.type==="dir") block+="total "+names.length+"\n";
        for(const nm of names){
          const ch=getChild(nm)||newFile("");
          const isdir=ch.type==="dir";
          const islink=ch.type==="link";
          const size= isdir?4096:(islink?(ch.target?ch.target.length:0):(ch.content?ch.content.length:0));
          const disp= isdir?'<span class="l-dir">'+esc(nm)+"</span>"

        }

          if(ch&&ch.type==="dir") return '<span class="l-dir">'+esc(nm)+"</span>";

  cd(args){

    if(!node) return {out:"",err:"cd: no such file or directory: "+t+"\n"};
    if(node.type!=="dir") return {out:"",err:"cd: not a directory: "+t+"\n"};

  },

  cat(args,stdin){

    for(const t of args){

      if(node&&node.type==="link") node=getNode(node.targetAbs);
      if(!node){err+="cat: "+t+": No such file or directory\n";continue;}
      if(node.type==="dir"){err+="cat: "+t+": Is a directory\n";continue;}

  mkdir(args){

    let err="";
    for(const d of dirs){
      const path=resolve(cwd,d);
      if(getNode(path)){ if(!p) err+="mkdir: cannot create directory '"+d+"': File exists\n"; continue; }
      const {par}=parentOf(path);
      if(!par && !p){ err+="mkdir: cannot create directory '"+d+"': No such file or directory\n"; continue; }
      if(p) mkdirp(path); else { const{par:pp,name}=parentOf(path); if(!pp){err+="mkdir: cannot create directory '"+d+"': No such file or directory\n";continue;} pp.children[name]=newDir(); }
    }

  },

  touch(args){
    if(args.length===0) return {out:"",err:"touch: missing file operand\n"};

      const path=resolve(cwd,f);
      const {par,name}=parentOf(path);
      if(!par){err+="touch: cannot touch '"+f+"': No such file or directory\n";continue;}

  rm(args){

      if(a.startsWith("-")&&a!=="-"){for(const ch of a.slice(1)){if(ch==="r"||ch==="R")r=true;if(ch==="f")f=true;}}
      else targets.push(a);
    }
    if(targets.length===0) return {out:"",err:f?"":"rm: missing operand\n"};
    let err="";
    for(const t of targets){
      const path=resolve(cwd,t);
      const node=getNode(path);
      if(!node){ if(!f) err+="rm: cannot remove '"+t+"': No such file or directory\n"; continue; }
      if(node.type==="dir"&&!r){ err+="rm: cannot remove '"+t+"': Is a directory\n"; continue; }

    const dst=ops.pop();

      const srcPath=resolve(cwd,src);
      const srcNode=getNode(srcPath);
      if(!srcNode){err+="cp: cannot stat '"+src+"': No such file or directory\n";continue;}
      if(srcNode.type==="dir"&&!r){err+="cp: -r not specified; omitting directory '"+src+"'\n";continue;}
      const clone=JSON.parse(JSON.stringify(srcNode));
      if(dstNode&&dstNode.type==="dir"){
        const base=srcPath.split("/").pop();
        dstNode.children[base]=clone;
      } else {
        const {par,name}=parentOf(dstPath);
        if(!par){err+="cp: cannot create '"+dst+"': No such file or directory\n";continue;}
        par.children[name]=clone;
      }
    }
    return {out:"",err};

    const dst=ops.pop();
    const dstPath=resolve(cwd,dst);
    const dstNode=getNode(dstPath);
    let err="";
    for(const src of ops){
      const srcPath=resolve(cwd,src);
      const srcNode=getNode(srcPath);
      if(!srcNode){err+="mv: cannot stat '"+src+"': No such file or directory\n";continue;}
      const {par:spar,name:sname}=parentOf(srcPath);
      if(dstNode&&dstNode.type==="dir"){
        dstNode.children[sname]=srcNode;
      } else {
        const {par,name}=parentOf(dstPath);
        if(!par){err+="mv: cannot move '"+src+"': No such file or directory\n";continue;}
        par.children[name]=srcNode;
      }
      if(spar) delete spar.children[sname];
    }
    return {out:"",err};
  },

  grep(args,stdin){

    for(const a of args){
      if(a.startsWith("-")&&a!=="-"){for(const ch of a.slice(1)){if(ch==="i")i=true;else if(ch==="n")n=true;else if(ch==="c")c=true;else if(ch==="v")v=true;}}
      else if(pattern===null) pattern=a;
      else files.push(a);
    }
    if(pattern===null) return {out:"",err:"usage: grep [-icnv] pattern [file ...]\n"};
    const rx=new RegExp(pattern.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),i?"i":"");
    const sources=[];
    if(files.length){
      for(const f of files){
        const node=deref(getNode(resolve(cwd,f)));
        if(!node){return {out:"",err:"grep: "+f+": No such file or directory\n"};}
        if(node.type==="dir"){return {out:"",err:"grep: "+f+": Is a directory\n"};}

      lines.forEach((line,idx)=>{
        const m=rx.test(line);
        if(m!==v){
          count++;
          if(!c){
            let prefix="";
            if(multi) prefix+= s.name+":";
            if(n) prefix+=(idx+1)+":";

            out+=prefix+hl+"\n";
          }
        }
      });
    }
    if(c) out=String(count)+"\n";

  wc(args,stdin){
    let l=false,w=false,c=false,files=[];
    for(const a of args){
      if(a.startsWith("-")&&a!=="-"){for(const ch of a.slice(1)){if(ch==="l")l=true;else if(ch==="w")w=true;else if(ch==="c")c=true;}}
      else files.push(a);
    }
    const showAll=!l&&!w&&!c;
    const measure=(text)=>{
      const nl=(text.match(/\n/g)||[]).length;
      const words=text.trim()===""?0:text.trim().split(/\s+/).length;
      const bytes=text.length;
      return {nl,words,bytes};
    };
    let out="",err="";
    const emit=(m,label)=>{
      let parts=[];
      if(l||showAll)parts.push(padL(m.nl,3));
      if(w||showAll)parts.push(padL(m.words,3));
      if(c||showAll)parts.push(padL(m.bytes,3));
      out+=parts.join(" ")+(label?" "+label:"")+"\n";
    };
    if(files.length){
      const tot={nl:0,words:0,bytes:0}; let count=0;
      for(const f of files){
        const node=deref(getNode(resolve(cwd,f)));
        if(!node){err+="wc: "+f+": No such file or directory\n";continue;}
        if(node.type==="dir"){err+="wc: "+f+": Is a directory\n";continue;}
        const m=measure(node.content||"");
        emit(m,f); tot.nl+=m.nl; tot.words+=m.words; tot.bytes+=m.bytes; count++;
      }
      if(count>1) emit(tot,"total");
    } else {
      emit(measure(stdin||""),"");
    }
    return {out,err};
  },

  head(args,stdin){

      else if(/^-\d+$/.test(a)){n=parseInt(a.slice(1),10);}

  tar(args){
    let rest=args.slice();
    let flagStr="";
    while(rest.length && /^-[cxtzvf]+$/.test(rest[0])) flagStr+=rest.shift().replace(/^-/,"");
    if(flagStr==="" && rest.length && /^[cxtzvf]+$/.test(rest[0])) flagStr=rest.shift();
    if(!flagStr) return {out:"",err:"tar: need one of -c, -x, or -t (with -f archive)\n"};
    const create=flagStr.includes("c"), extract=flagStr.includes("x"), list=flagStr.includes("t");
    const gz=flagStr.includes("z"), verbose=flagStr.includes("v");
    let archive=null;
    if(flagStr.includes("f")) archive=rest.shift();
    if(!archive) return {out:"",err:"tar: no archive name given (use -f NAME)\n"};
    const members=rest;
    let out="",err="";
    if(create){
      const entries=[];
      const addNode=(node,rel)=>{
        if(node.type==="dir"){ entries.push({name:rel+"/",type:"dir",mode:node.mode});
          for(const k of Object.keys(node.children)) addNode(node.children[k],rel+"/"+k); }
        else if(node.type==="link"){ entries.push({name:rel,type:"link",target:node.target,targetAbs:node.targetAbs}); }
        else entries.push({name:rel,type:"file",content:node.content,mode:node.mode,gz:node.gz});
      };
      for(const m of members){ const n=getNode(resolve(cwd,m)); if(!n){err+="tar: "+m+": Cannot stat: No such file or directory\n";continue;} addNode(n,m.replace(/\/+$/,"")); }
      const {par,name}=parentOf(resolve(cwd,archive));
      if(!par) return {out:"",err:"tar: "+archive+": Cannot open: No such file or directory\n"};
      par.children[name]={type:"file",content:entries.map(e=>e.content||"").join(""),tar:entries,gz:gz};
      if(verbose) out=entries.map(e=>e.name).join("\n")+"\n";
      return {out,err};
    }
    const arch=getNode(resolve(cwd,archive));
    if(!arch||!arch.tar) return {out:"",err:"tar: "+archive+": not a tar archive\n"};
    if(list){ return {out:arch.tar.map(e=>e.name).join("\n")+"\n",err:""}; }
    if(extract){
      for(const e of arch.tar){
        const p=resolve(cwd,e.name.replace(/\/+$/,""));
        if(e.type==="dir"){ mkdirp(p); }
        else if(e.type==="link"){ const {par,name}=parentOf(p); if(par) par.children[name]={type:"link",target:e.target,targetAbs:e.targetAbs}; }
        else { const dir=p.split("/").slice(0,-1).join("/"); if(dir) mkdirp(dir); writeFile(p,e.content); const nn=getNode(p); if(nn){ if(e.mode!=null)nn.mode=e.mode; if(e.gz)nn.gz=true; } }
      }
      if(verbose) out=arch.tar.map(e=>e.name).join("\n")+"\n";
      return {out,err};
    }
    return {out:"",err:"tar: nothing to do\n"};
  },

  gzip(args){
    let d=false,keep=false,files=[];
    for(const a of args){
      if(a==="--decompress")d=true; else if(a==="--keep")keep=true;
      else if(a.startsWith("-")&&a!=="-"){for(const ch of a.slice(1)){if(ch==="d")d=true;if(ch==="k")keep=true;}}
      else files.push(a);
    }
    if(!files.length) return {out:"",err:"gzip: no input files\n"};
    let err="";
    for(const f of files){
      const p=resolve(cwd,f); const node=getNode(p);
      if(!node){err+="gzip: "+f+": No such file or directory\n";continue;}
      if(node.type==="dir"){err+="gzip: "+f+": is a directory -- ignored\n";continue;}
      if(d){
        if(!f.endsWith(".gz")){err+="gzip: "+f+": unknown suffix -- ignored\n";continue;}
        const {par,name}=parentOf(resolve(cwd,f.replace(/\.gz$/,"")));
        par.children[name]={type:"file",content:node.content,mode:node.mode,tar:node.tar};
        if(node.tar) par.children[name].gz=false;
      } else {
        if(node.gz){err+="gzip: "+f+": already has .gz suffix -- unchanged\n";continue;}
        const {par,name}=parentOf(resolve(cwd,f+".gz"));
        par.children[name]={type:"file",content:node.content,mode:node.mode,gz:true,tar:node.tar};
      }
      if(!keep){ const pp=parentOf(p); if(pp.par) delete pp.par.children[pp.name]; }
    }
    return {out:"",err};
  },

  sort(args,stdin){
    let r=false,n=false,u=false,files=[];
    for(const a of args){
      if(a.startsWith("-")&&a!=="-"){for(const ch of a.slice(1)){if(ch==="r")r=true;else if(ch==="n")n=true;else if(ch==="u")u=true;}}

    else text=stdin||"";
    let lines=text.split("\n"); if(lines[lines.length-1]==="")lines.pop();
    lines.sort((a,b)=> n? ((parseFloat(a)||0)-(parseFloat(b)||0)) : a.localeCompare(b));
    if(r) lines.reverse();
    if(u){const seen=new Set();lines=lines.filter(l=>{if(seen.has(l))return false;seen.add(l);return true;});}
    return {out: lines.join("\n")+(lines.length?"\n":""), err};
  },

  uniq(args,stdin){
    let c=false,d=false,uu=false,files=[];
    for(const a of args){
      if(a.startsWith("-")&&a!=="-"){for(const ch of a.slice(1)){if(ch==="c")c=true;else if(ch==="d")d=true;else if(ch==="u")uu=true;}}
      else files.push(a);
    }

    else text=stdin||"";
    let lines=text.split("\n"); if(lines[lines.length-1]==="")lines.pop();
    const out=[]; let i=0;

      const count=j-i;

      else out.push(lines[i]);

    }
    return {out: out.join("\n")+(out.length?"\n":""), err};
  },

  cut(args,stdin){
    let delim="\t",fspec=null,cspec=null,files=[];
    for(let i=0;i<args.length;i++){
      const a=args[i];
      if(a==="-d"){delim=args[++i];}
      else if(a.startsWith("-d")){delim=a.slice(2);}
      else if(a==="-f"){fspec=args[++i];}
      else if(a.startsWith("-f")){fspec=a.slice(2);}
      else if(a==="-c"){cspec=args[++i];}
      else if(a.startsWith("-c")){cspec=a.slice(2);}
      else files.push(a);
    }
    let text="",err="";
    if(files.length){for(const f of files){const nd=deref(getNode(resolve(cwd,f)));if(!nd){err+="cut: "+f+": No such file or directory\n";continue;}if(nd.type==="file")text+=nd.content||"";}}
    else text=stdin||"";
    let lines=text.split("\n"); if(lines[lines.length-1]==="")lines.pop();
    const parseSpec=(spec)=>{
      const idxs=[];
      spec.split(",").forEach(part=>{
        let m;
        if((m=part.match(/^(\d+)-(\d+)$/))){for(let i=+m[1];i<=+m[2];i++)idxs.push(i);}
        else if((m=part.match(/^(\d+)-$/))){idxs.push({from:+m[1]});}
        else if((m=part.match(/^-(\d+)$/))){for(let i=1;i<=+m[1];i++)idxs.push(i);}
        else if(/^\d+$/.test(part)) idxs.push(+part);
      });
      return idxs;
    };
    const out=[];
    for(const line of lines){
      if(fspec){
        const fields=line.split(delim); const idxs=parseSpec(fspec); const picked=[];
        idxs.forEach(ix=>{ if(typeof ix==="object"){for(let i=ix.from;i<=fields.length;i++)picked.push(fields[i-1]);} else if(fields[ix-1]!==undefined)picked.push(fields[ix-1]); });
        out.push(picked.join(delim));
      } else if(cspec){
        const idxs=parseSpec(cspec); let picked="";
        idxs.forEach(ix=>{ if(typeof ix==="object"){picked+=line.slice(ix.from-1);} else if(line[ix-1]!==undefined)picked+=line[ix-1]; });
        out.push(picked);
      } else out.push(line);
    }
    return {out: out.join("\n")+(out.length?"\n":""), err};
  },

  tr(args,stdin){
    let d=false,s=false,sets=[];
    for(const a of args){
      if(a==="-d")d=true; else if(a==="-s")s=true;
      else if(a.startsWith("-")&&a.length>1&&/^-[ds]+$/.test(a)){for(const ch of a.slice(1)){if(ch==="d")d=true;if(ch==="s")s=true;}}
      else sets.push(a);
    }
    const expand=(str)=>{ let o=""; for(let i=0;i<str.length;i++){ if(str[i+1]==="-"&&str[i+2]!==undefined){ for(let c=str.charCodeAt(i);c<=str.charCodeAt(i+2);c++)o+=String.fromCharCode(c); i+=2; } else o+=str[i]; } return o; };
    let text=stdin||"";
    const set1=expand(sets[0]||"");
    if(d){ const rm=new Set(set1); text=text.split("").filter(c=>!rm.has(c)).join(""); }
    else if(sets[1]!=null){ const set2=expand(sets[1]); const map={}; for(let i=0;i<set1.length;i++) map[set1[i]]=set2[i]!==undefined?set2[i]:set2[set2.length-1]; text=text.split("").map(c=>map[c]!==undefined?map[c]:c).join(""); }
    if(s){ const sq=new Set(expand(sets[1]||sets[0]||"")); let o="",prev=null; for(const c of text){ if(sq.has(c)&&c===prev)continue; o+=c; prev=c; } text=o; }
    return {out:text,err:""};
  },

  sed(args,stdin){
    let n=false,script=null,files=[];
    for(const a of args){
      if(a==="-n")n=true;
      else if(a.startsWith("-")&&a!=="-"){}
      else if(script===null)script=a;
      else files.push(a);
    }
    if(script===null) return {out:"",err:"usage: sed [-n] script [file]\n"};
    let text="",err="";
    if(files.length){for(const f of files){const nd=deref(getNode(resolve(cwd,f)));if(!nd){err+="sed: can't read "+f+": No such file or directory\n";continue;}if(nd.type==="dir"){err+="sed: read "+f+": Is a directory\n";continue;}text+=nd.content||"";}}
    else text=stdin||"";
    let lines=text.split("\n"); if(lines[lines.length-1]==="")lines.pop();
    const out=[];
    let m;
    if((m=script.match(/^s(.)(.*)$/))){
      const delim=m[1]; const seg=m[2].split(delim);
      const re=seg[0]||"", rep=(seg[1]||"").replace(/\\n/g,"\n"), flags=seg[2]||"";
      let rx; try{ rx=new RegExp(re,(flags.includes("g")?"g":"")+(flags.includes("i")?"i":"")); }catch(e){ return {out:"",err:"sed: bad regular expression\n"}; }
      for(const line of lines){ if(!n) out.push(line.replace(rx,rep)); }
    } else if((m=script.match(/^(\d+)d$/))){
      const t=+m[1]; lines.forEach((line,i)=>{ if(i+1!==t) out.push(line); });
    } else if((m=script.match(/^\/(.*)\/d$/))){
      let rx; try{rx=new RegExp(m[1]);}catch(e){return{out:"",err:"sed: bad regular expression\n"};}
      lines.forEach(line=>{ if(!rx.test(line)) out.push(line); });
    } else if((m=script.match(/^\/(.*)\/p$/))){
      let rx; try{rx=new RegExp(m[1]);}catch(e){return{out:"",err:"sed: bad regular expression\n"};}
      lines.forEach(line=>{ if(rx.test(line)) out.push(line); });
    } else {
      return {out:"",err:"sed: unsupported script: "+script+"\n"};
    }
    return {out: out.join("\n")+(out.length?"\n":""), err};
  },

  awk(args,stdin){
    let FS=null,program=null,files=[];
    for(let i=0;i<args.length;i++){
      const a=args[i];
      if(a==="-F"){FS=args[++i];}
      else if(a.startsWith("-F")){FS=a.slice(2);}
      else if(program===null){program=a;}
      else files.push(a);
    }
    if(program===null) return {out:"",err:"usage: awk [-F sep] program [file]\n"};
    let text="",err="";
    if(files.length){for(const f of files){const nd=deref(getNode(resolve(cwd,f)));if(!nd){err+="awk: can't open file "+f+"\n";continue;}if(nd.type==="file")text+=nd.content||"";}}
    else text=stdin||"";
    let lines=text.split("\n"); if(lines[lines.length-1]==="")lines.pop();
    const sepRx = FS? (FS===" "?/\s+/:new RegExp(FS.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"))) : /\s+/;
    let pattern=null,action=null,am=program.match(/^\s*(.*?)\s*\{(.*)\}\s*$/);
    if(am){ pattern=am[1].trim()||null; action=am[2].trim(); }
    else { pattern=program.trim()||null; action=null; }
    const out=[];
    lines.forEach((line,idx)=>{
      const nr=idx+1;
      const fields = FS? line.split(sepRx) : line.trim().split(sepRx);
      if(!awkPat(pattern,fields,line,nr)) return;
      if(action===null||action===""){ out.push(line); return; }
      const pm=action.match(/^print\b(.*)$/);
      if(pm){
        const argstr=pm[1].trim();
        if(argstr===""){ out.push(line); return; }
        out.push(argstr.split(",").map(t=>awkVal(t,fields,line,nr)).join(" "));
      } else { out.push(line); }
    });
    return {out: out.join("\n")+(out.length?"\n":""), err};
  },

  xargs(args,stdin){
    let items=(stdin||"").split(/\s+/).filter(Boolean);
    let repl=null,n=null,cmdToks=[];
    for(let i=0;i<args.length;i++){
      const a=args[i];
      if(a==="-I"){repl=args[++i];}
      else if(a.startsWith("-I")&&a.length>2){repl=a.slice(2);}
      else if(a==="-n"){n=parseInt(args[++i],10)||null;}
      else if(/^-n\d+$/.test(a)){n=parseInt(a.slice(2),10)||null;}
      else cmdToks.push(a);
    }
    if(cmdToks.length===0) cmdToks=["echo"];
    const name=cmdToks[0], fn=CMDS[name];
    if(!fn) return {out:"",err:"xargs: "+name+": No such file or directory\n"};
    let out="",err="";
    const runBatch=(batch)=>{
      let argv;
      if(repl){ argv=cmdToks.slice(1).map(t=> t.split(repl).join(batch.join(" "))); }
      else argv=cmdToks.slice(1).concat(batch);
      const r=fn(argv,"");
      out+= r.raw? r.out : esc(r.out||"");
      if(r.err) err+=r.err;
    };
    if(items.length===0){ /* no input, run nothing */ }
    else if(repl){ items.forEach(it=>runBatch([it])); }
    else if(n){ for(let i=0;i<items.length;i+=n) runBatch(items.slice(i,i+n)); }
    else runBatch(items);

  },

  chmod(args){
    const modeArg=args[0], targets=args.slice(1);
    if(!modeArg||!targets.length) return {out:"",err:"chmod: missing operand\n"};
    let err="";
    for(const t of targets){
      const node=getNode(resolve(cwd,t));
      if(!node){err+="chmod: cannot access '"+t+"': No such file or directory\n";continue;}
      let cur = node.mode!=null? node.mode : (node.type==="dir"?0o755:0o644);
      if(/^[0-7]{3,4}$/.test(modeArg)){ cur=parseInt(modeArg,8); }
      else {
        const m=modeArg.match(/^([ugoa]*)([+\-=])([rwx]+)$/);
        if(!m){ err+="chmod: invalid mode: '"+modeArg+"'\n"; continue; }
        let who=m[1]||"a"; const op=m[2]; const perms=m[3];
        let mask=0; if(perms.includes("r"))mask|=4; if(perms.includes("w"))mask|=2; if(perms.includes("x"))mask|=1;
        const apply=(shift)=>{ if(op==="+")cur|=(mask<<shift); else if(op==="-")cur&=~(mask<<shift); else { cur&=~(7<<shift); cur|=(mask<<shift); } };
        if(who.includes("a")){apply(6);apply(3);apply(0);}
        else { if(who.includes("u"))apply(6); if(who.includes("g"))apply(3); if(who.includes("o"))apply(0); }
      }
      node.mode=cur;
    }
    return {out:"",err};
  },

  history(){
    let out="";
    history.forEach((h,i)=>{out+=padL(i+1,4)+"  "+h+"\n";});
    return {out,err:""};
  }
};

function jqStep(step,v){
  if(step===".") return [v];
  if(step==="length") return [ Array.isArray(v)?v.length : typeof v==="string"?v.length : (v&&typeof v==="object")?Object.keys(v).length:0 ];
  if(step==="keys"||step==="keys_unsorted") return [ (v&&typeof v==="object")?Object.keys(v).sort():[] ];
  const toks=step.match(/\.[A-Za-z_][\w]*|\["[^"]*"\]|\[\d+\]|\[\]/g);
  if(!toks) return [v];
  let vals=[v];
  for(const t of toks){
    const next=[];
    for(const cv of vals){
      if(cv==null){ next.push(null); continue; }
      if(t==="[]"){ if(Array.isArray(cv)) next.push(...cv); else if(typeof cv==="object") next.push(...Object.values(cv)); }
      else if(/^\[\d+\]$/.test(t)) next.push(cv[parseInt(t.slice(1),10)]);
      else if(/^\["[^"]*"\]$/.test(t)) next.push(cv[t.slice(2,-2)]);
      else if(t.startsWith(".")) next.push(cv[t.slice(1)]);
    }
    vals=next;
  }
  return vals;
}
function awkVal(tok,fields,line,nr){
  tok=tok.trim();
  if(tok==="$0") return line;
  if(tok==="NR") return String(nr);
  if(tok==="NF") return String(fields.length);
  let m=tok.match(/^\$NF$/); if(m) return fields[fields.length-1]||"";
  m=tok.match(/^\$\(NF-(\d+)\)$/); if(m) return fields[fields.length-1-(+m[1])]||"";
  m=tok.match(/^\$(\d+)$/); if(m){const k=+m[1]; return k===0?line:(fields[k-1]||"");}
  m=tok.match(/^"(.*)"$/); if(m) return m[1];
  return tok;
}
function awkPat(pattern,fields,line,nr){
  if(!pattern) return true;
  let m=pattern.match(/^\/(.*)\/$/); if(m){try{return new RegExp(m[1]).test(line);}catch(e){return false;}}
  m=pattern.match(/^NR\s*==\s*(\d+)$/); if(m) return nr===+m[1];
  m=pattern.match(/^NR\s*>\s*(\d+)$/); if(m) return nr>+m[1];
  m=pattern.match(/^NR\s*<\s*(\d+)$/); if(m) return nr<+m[1];
  m=pattern.match(/^\$(\d+)\s*==\s*(.+)$/); if(m){const v=fields[+m[1]-1]||""; return v===m[2].trim().replace(/^"|"$/g,"");}
  m=pattern.match(/^\$(\d+)\s*~\s*\/(.*)\/$/); if(m){const v=fields[+m[1]-1]||""; try{return new RegExp(m[2]).test(v);}catch(e){return false;}}
  return true;
}

function walkFind(node,path,base,rx,emit){
  if(!rx||rx.test(base)) emit(path+"\n");
  if(node.type==="dir"){for(const k of Object.keys(node.children)){walkFind(node.children[k],path+"/"+k,k,rx,emit);}}
}

/* Run a full input line: handle redirection + pipes. Returns {text, html, isErr} */
/* pull trailing redirections off a command line (simple parser: operators inside quotes at the very end are not special — matches prior behavior) */
function parseRedirs(work){
  const R={stdin:null,out:null,outApp:false,err:null,errApp:false,mergeErr:false};
  let changed=true,m;
  while(changed){
    changed=false;
    if((m=work.match(/\s2>&1\s*$/))){ R.mergeErr=true; work=work.slice(0,m.index); changed=true; continue; }
    if((m=work.match(/\s2>>\s*(\S+)\s*$/))){ R.err=m[1]; R.errApp=true; work=work.slice(0,m.index); changed=true; continue; }
    if((m=work.match(/\s2>\s*(\S+)\s*$/))){ R.err=m[1]; work=work.slice(0,m.index); changed=true; continue; }
    if((m=work.match(/\s&>\s*(\S+)\s*$/))){ R.out=m[1]; R.mergeErr=true; work=work.slice(0,m.index); changed=true; continue; }
    if((m=work.match(/\s1?>>\s*(\S+)\s*$/))){ R.out=m[1]; R.outApp=true; work=work.slice(0,m.index); changed=true; continue; }
    if((m=work.match(/\s1?>\s*(\S+)\s*$/))){ R.out=m[1]; work=work.slice(0,m.index); changed=true; continue; }
    if((m=work.match(/\s<\s*(\S+)\s*$/))){ R.stdin=m[1]; work=work.slice(0,m.index); changed=true; continue; }
  }
  R.cmd=work;
  return R;
}
function writeRedir(path,content,append){
  const {par,name}=parentOf(resolve(cwd,path));
  if(!par) return "cannot create "+path+": No such file or directory\n";
  const ex=par.children[name];
  const prev=(append&&ex&&ex.type==="file")?ex.content:"";
  par.children[name]=newFile(prev+content);
  return "";
}

function runSimple(line){
  let work=line;
  let background=false;
  { const tw=work.trim(); if(tw.endsWith("&") && !tw.endsWith("&&")){ background=true; work=tw.slice(0,-1).trim(); } }
  work=expandVars(work);
  const R=parseRedirs(work); work=R.cmd;
  const segments=splitPipes(work).map(s=>s.trim()).filter(s=>s.length);
  let lastRaw=false; let errAcc=""; let clearScreen=false;
  let htmlOut=""; let lastCode=0;
  let stdin="";
  if(R.stdin!=null){ const nd=deref(getNode(resolve(cwd,R.stdin))); if(nd&&nd.type==="file") stdin=nd.content||""; else errAcc+=(R.stdin+": No such file or directory\n"); }
  for(let s=0;s<segments.length;s++){
    const toks=expandGlobs(tokenizeArgs(segments[s]));
    const name=toks[0];
    const argv=toks.slice(1);
    if(!name) continue;
    // bare assignments:  NAME=value  (one or more, no command)
    if(toks.every(t=>/^[A-Za-z_]\w*=/.test(t))){
      for(const t of toks){ const eq=t.indexOf("="); ENV[t.slice(0,eq)]=t.slice(eq+1); }
      stdin=""; lastRaw=false; htmlOut=""; lastCode=0;
      continue;
    }
    const fn=CMDS[name];
    if(!fn){
      errAcc+=name+": command not found\n";
      stdin=""; lastRaw=false; lastCode=127;
      continue;
    }
    const res=fn(argv,stdin);
    if(res.clear) clearScreen=true;
    if(res.err) errAcc+=res.err;
    // stdin for next stage should be plain text (strip html if raw)
    stdin= res.raw? stripTags(res.out) : (res.out||"");
    htmlOut= res.raw? res.out : esc(res.out||"");
    lastRaw= !!res.raw;
    lastCode = res.code!=null ? res.code : ((res.err&&res.err.length)?1:0);
  }
  // apply output redirections
  if(R.mergeErr){ stdin=stdin+errAcc; if(errAcc) htmlOut=htmlOut+esc(errAcc); errAcc=""; }
  if(R.err!=null){ errAcc=writeRedir(R.err,errAcc,R.errApp); }
  if(R.out!=null){ const e=writeRedir(R.out,stdin,R.outApp); htmlOut=""; stdin=""; if(e)errAcc+=e; }
  if(background && work.trim()){
    const job=registerJob(work.trim());
    const idx=runningJobs().length;
    htmlOut='<span class="l-dim">['+idx+'] '+job.pid+"</span>\n"+htmlOut;
    lastCode=0;
  }
  return {html:htmlOut, err:errAcc, clear:clearScreen, plain:stdin, code:lastCode};
}

/* split a line on ; && || (respecting quotes) into a chain of {op, cmd} */
const KW_OPEN={"for":1,"while":1,"until":1,"if":1}, KW_CLOSE={"done":1,"fi":1};
function splitChain(line){
  const parts=[]; let cur="",q=null,op=null,pdepth=0,bdepth=0,word="";
  const flush=()=>{ if(word){ if(KW_OPEN[word])bdepth++; else if(KW_CLOSE[word])bdepth=Math.max(0,bdepth-1); word=""; } };
  const push=(o)=>{ parts.push({op,cmd:cur}); op=o; cur=""; };
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(q){ cur+=c; if(c===q)q=null; continue; }
    if(/[A-Za-z_]/.test(c)){ word+=c; cur+=c; continue; }
    flush();
    if(c==="'"||c==='"'){ q=c; cur+=c; continue; }
    if(c==="("){ pdepth++; cur+=c; continue; }
    if(c===")"){ if(pdepth>0)pdepth--; cur+=c; continue; }
    if(pdepth===0 && bdepth===0 && c===";"){ push(";"); continue; }
    if(pdepth===0 && bdepth===0 && c==="&"&&line[i+1]==="&"){ push("&&"); i++; continue; }
    if(pdepth===0 && bdepth===0 && c==="|"&&line[i+1]==="|"){ push("||"); i++; continue; }
    cur+=c;
  }
  flush();
  parts.push({op,cmd:cur});
  return parts.filter(p=>p.cmd.trim()!=="");
}

/* while COND; do BODY; done */
function tryWhile(line){
  const m=line.match(/^\s*while\s+([\s\S]+?)\s*;\s*do\b([\s\S]+?)\s*;?\s*done\s*;?\s*$/);
  if(!m) return null;
  const cond=m[1].trim(), body=m[2].trim();
  const htmlParts=[]; let clearAll=false, code=0, outText="", guard=0;
  while(guard++ < 10000){
    const cres=runLine(cond);
    if(cres.code!==0) break;
    const res=runLine(body);
    if(res.clear) clearAll=true;
    code=res.code;
    if(res.html && res.html.length) htmlParts.push(res.html.replace(/\n$/,""));
    outText += (res.plain!=null ? res.plain : stripTags(res.html||""));
  }
  if(guard>=10000) htmlParts.push('<span class="l-err">while: stopped after 10000 iterations (runaway loop)</span>');
  return {html:htmlParts.join("\n"), err:"", clear:clearAll, plain:outText, code};
}

/* if COND; then BODY; [else BODY2;] fi */
function tryIf(line){
  const m=line.match(/^\s*if\b([\s\S]+?);\s*then\b([\s\S]+?)(?:;\s*else\b([\s\S]+?))?;?\s*fi\s*;?\s*$/);
  if(!m) return null;
  const cond=m[1].trim(), thenB=m[2].trim(), elseB=m[3]!=null?m[3].trim():null;
  const cres=runLine(cond);
  if(cres.code===0) return runLine(thenB);
  if(elseB!=null) return runLine(elseB);
  return {html:"", err:"", clear:false, plain:"", code:cres.code};
}

/* dispatch a single chain segment to a compound handler or the simple runner */
function runSegment(seg){
  return tryForLoop(seg) || tryWhile(seg) || tryIf(seg) || runSimple(seg);
}

/* for VAR in LIST; do BODY; done */
function forList(listStr){
  return expandGlobs(tokenizeArgs(expandVars(listStr)));
}
function tryForLoop(line){
  const m=line.match(/^\s*for\s+([A-Za-z_]\w*)\s+in\s+(.+?)\s*;\s*do\b([\s\S]+?)\s*;?\s*done\s*;?\s*$/);
  if(!m) return null;
  const varName=m[1], words=forList(m[2]), body=m[3].trim();
  const htmlParts=[]; let clearAll=false, code=0, outText="";
  for(const w of words){
    ENV[varName]=w;
    const res=runLine(body);
    if(res.clear) clearAll=true;
    code=res.code;
    if(res.html && res.html.length) htmlParts.push(res.html.replace(/\n$/,""));
    outText += (res.plain!=null ? res.plain : stripTags(res.html||""));
  }
  return {html:htmlParts.join("\n"), err:"", clear:clearAll, plain:outText, code};
}

/* orchestrate a chained command line, honoring exit codes for && and || */
function runLine(line){
  const parts=splitChain(line);
  const htmlParts=[]; let clearAll=false, code=0, outText="";
  for(let i=0;i<parts.length;i++){
    const p=parts[i];
    const run = p.op==="&&" ? code===0 : p.op==="||" ? code!==0 : true;
    if(!run) continue;
    const res=runSegment(p.cmd);
    if(res.clear) clearAll=true;
    code=res.code;
    if(res.html && res.html.length) htmlParts.push(res.html.replace(/\n$/,""));
    if(res.err && res.err.length) htmlParts.push('<span class="l-err">'+esc(res.err.replace(/\n$/,""))+"</span>");
    outText += stripTags(res.html||"") + "\n";
  }
  return {html:htmlParts.join("\n"), err:"", clear:clearAll, plain:outText, code};
}

function splitPipes(str){
  const out=[]; let cur="",q=null,depth=0;
  for(let i=0;i<str.length;i++){
    const c=str[i];
    if(q){ cur+=c; if(c===q)q=null; continue; }
    if(c==='"'||c==="'"){ q=c; cur+=c; continue; }
    if(c==="("){ depth++; cur+=c; continue; }
    if(c===")"){ if(depth>0)depth--; cur+=c; continue; }
    if(depth===0 && c==="|"){ out.push(cur); cur=""; continue; }
    cur+=c;
  }
  out.push(cur);
  return out;
}
function stripTags(s){ return s.replace(/<[^>]*>/g,""); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
